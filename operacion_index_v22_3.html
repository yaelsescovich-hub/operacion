<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>4TMS · Operación</title>
<style>
:root{--navy:#22255A;--must:#D8A828;--green:#6FA52C;--red:#c0392b;--ink:#20232e;--mut:#6b7280;--line:#e3e6ef;--bg:#f4f5f9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
header{background:var(--navy);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
header .logo{font-weight:bold;font-size:18px}header .logo span{color:var(--must)}
header .who{margin-left:auto;font-size:12px;color:#c7cbe0;display:flex;align-items:center;gap:10px}
.tabs{background:#fff;border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 12px;position:sticky;top:48px;z-index:19;overflow-x:auto}
.tabs button{border:none;background:none;padding:12px 14px;font-size:14px;color:var(--mut);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tabs button.on{color:var(--navy);font-weight:bold;border-bottom-color:var(--must)}
.main{max-width:1140px;margin:0 auto;padding:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:0 4px 14px rgba(20,22,40,.04);margin-bottom:14px}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.search{flex:1;min-width:170px;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:14px}
select,input,textarea{border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:14px;font-family:inherit;background:#fff}
textarea{width:100%;min-height:56px;resize:vertical}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
th{color:var(--mut);font-weight:bold;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
td.r,th.r{text-align:right}
.btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:bold;cursor:pointer;text-decoration:none;display:inline-block}
.btn.g{background:var(--green)}.btn.m{background:var(--must);color:#20232e}.btn.ghost{background:#eef0f7;color:var(--navy)}.btn.sm{padding:6px 9px;font-size:12px}
.btn:disabled{opacity:.55;cursor:default}
.empty{color:var(--mut);text-align:center;padding:22px}
.muted{color:var(--mut)}.hint{font-size:12px;color:var(--mut)}
.fld{margin:8px 0}.fld label{display:block;font-size:12px;color:var(--navy);font-weight:bold;margin-bottom:3px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:640px){.two,.three{grid-template-columns:1fr}}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#fff}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:#eef0f7;color:var(--navy);font-weight:600}
.gest{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;color:#fff;font-weight:600}
.sec{font-weight:bold;color:var(--navy);margin:16px 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.03em}
.ov{position:fixed;inset:0;background:rgba(20,22,40,.5);display:none;align-items:flex-start;justify-content:center;z-index:40;padding:24px 12px;overflow:auto}
.modal{background:#fff;border-radius:14px;max-width:660px;width:100%;padding:20px}
.modal h3{color:var(--navy);margin-bottom:4px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
@media(max-width:640px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px}
.kpi .l{font-size:11px;color:var(--mut)}.kpi .v{font-size:20px;font-weight:bold;color:var(--navy)}
.kpi.g{border-left:4px solid var(--green)}.kpi.m{border-left:4px solid var(--must)}.kpi.n{border-left:4px solid var(--navy)}.kpi.r{border-left:4px solid var(--red)}
.pbar{height:8px;background:#eef0f7;border-radius:6px;overflow:hidden}.pbar>span{display:block;height:100%;background:var(--green)}
.pbarmini{height:6px;background:#eef0f7;border-radius:4px;overflow:hidden;min-width:70px}.pbarmini>span{display:block;height:100%;background:var(--green)}
/* etapas estilo checklist con fecha */
.etaprow{display:flex;align-items:center;gap:10px;padding:9px 6px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.etaprow.hecho{background:#f5faef}
.etaprow.vencida{background:#fdeeee;border-left:3px solid var(--red)}
.sw{position:relative;width:38px;height:22px;flex:0 0 auto;cursor:pointer}
.sw input{opacity:0;width:0;height:0}
.sw span{position:absolute;inset:0;background:#cfd3de;border-radius:22px;transition:.15s}
.sw span:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
.sw input:checked+span{background:var(--green)}.sw input:checked+span:before{transform:translateX(16px)}
.etnm{flex:1;min-width:140px;font-weight:bold;color:var(--navy)}
.etmeta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.divpost{border-top:1px dashed var(--line);margin:6px 0;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding-top:8px}
.adj{font-size:12px;background:#f6f7fb;border:1px solid var(--line);border-radius:6px;padding:5px 8px;margin:4px 0 4px 48px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.hito{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px}
.hito.pagado{background:#f5faef}.hito.anulado{opacity:.6}
.tgl{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mut)}
.login{max-width:360px;margin:60px auto;padding:26px}.login h2{color:var(--navy);margin-bottom:4px}
.genrow{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
</style></head>

function openGenerador(key){var g=GENS_EMBED.find(function(x){return x.key===key;});if(!g)return;var html=b64html(g.b64);var full;if(g.skipExport){full=html;}else{var idx=html.lastIndexOf('</body>');full=idx>=0?(html.slice(0,idx)+GEN_EXPORT+html.slice(idx)):(html+GEN_EXPORT);}var u=URL.createObjectURL(new Blob([full],{type:'text/html'}));window.open(u,'_blank');setTimeout(function(){URL.revokeObjectURL(u);},60000);}
async function delProyecto(id){
 if(!IS_ADMIN){alert('Solo el administrador puede eliminar proyectos.');return;}
 var p={};try{p=(await sb.from('proyectos').select('cliente,cargo').eq('id',id).single()).data||{};}catch(e){}
 var nom=((p.cliente||'')+' · '+(p.cargo||'')).trim();
 if(!confirm('¿Eliminar el proyecto "'+nom+'" de forma permanente? Se borran sus etapas, candidatos del pipeline, hitos, referencias, entregables y adjuntos. No se puede deshacer.'))return;
 try{
  try{var adj=(await sb.from('adjuntos').select('path').eq('proyecto_id',id)).data||[];var paths=adj.map(function(a){return a.path;}).filter(Boolean);if(paths.length)await sb.storage.from('documentos').remove(paths);}catch(e){}
  var hijas=['proyecto_etapas','candidatos_proyecto','adjuntos','hitos_facturacion','referencias','entregables_od','sesiones_mentoring','cargos_benchmark'];
  for(var i=0;i<hijas.length;i++){try{await sb.from(hijas[i]).delete().eq('proyecto_id',id);}catch(e){}}
  var r=await sb.from('proyectos').delete().eq('id',id);if(r.error)throw r.error;
  PROY=null;setTab('proyectos');
 }catch(e){alert('No se pudo eliminar: '+(e.message||e));}
}

/* ===================== HELPERS ===================== */
function el(id){return document.getElementById(id);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fix(s){if(s==null)return '';return String(s).replace(/\s+/g,' ').trim();}
function esc2(s){return esc(fix(s));}
function today(){return new Date().toISOString().slice(0,10);}
function fmtMoney(v,m){if(v==null||v==='')return '—';var n=Math.round(Number(v));if(m==='UF')return 'UF '+n.toLocaleString('es-CL');if(m==='USD')return 'US$ '+n.toLocaleString('es-CL');return '$'+n.toLocaleString('es-CL');}
function daysBetween(a,b){if(!a)return 0;var s=new Date(a),e=b?new Date(b):new Date();var d=Math.round((e-s)/86400000);return d<0?0:d;}
function meNombre(){if(!SESSION)return '';var e=EJEC.find(function(x){return (x.email||'').toLowerCase()===(SESSION.email||'').toLowerCase();});return e?e.nombre:(SESSION.email||'').split('@')[0];}

function ecolor(n){var e=EJEC.find(function(x){return x.nombre===n;});return e&&e.color?e.color:'#8a8f9c';}

/* ===================== RESPALDO ===================== */
var BACKUP_TABLES=['proyectos','proyecto_etapas','candidatos','candidatos_proyecto','adjuntos','hitos_facturacion','referencias','entregables_od','sesiones_mentoring','cargos_benchmark','encuestas','ejecutivos'];
async function _dumpTabla(t){var rows=[],from=0,PAGE=1000;while(true){var r=await sb.from(t).select('*').range(from,from+PAGE-1);if(r.error)return {__error:r.error.message};var d=r.data||[];rows=rows.concat(d);if(d.length<PAGE)break;from+=PAGE;}return rows;}
function _stamp(){var d=new Date();function p(n){return (n<10?'0':'')+n;}return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes());}
function _bajar(nombre,contenido,tipo){var blob=(contenido instanceof Blob)?contenido:new Blob([contenido],{type:tipo||'application/octet-stream'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=nombre;a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},5000);}
async function exportarRespaldoDatos(btn){
 if(!IS_ADMIN){alert('Solo el administrador puede exportar el respaldo.');return;}
 var lbl=btn?btn.textContent:'';if(btn){btn.disabled=true;}
 try{
  var out={_app:'operacion',_fecha:new Date().toISOString(),_por:meNombre(),tablas:{}};var resumen=[];
  for(var i=0;i<BACKUP_TABLES.length;i++){var t=BACKUP_TABLES[i];if(btn)btn.textContent='Respaldando '+t+'…';var data=await _dumpTabla(t);out.tablas[t]=data;resumen.push(t+': '+((data&&data.__error)?('ERROR '+data.__error):(data.length+' filas')));}
  _bajar('respaldo-operacion-'+_stamp()+'.json',JSON.stringify(out),'application/json');
  alert('Respaldo de datos listo.\n\n'+resumen.join('\n'));
 }catch(e){alert('Error en el respaldo: '+(e.message||e));}
 finally{if(btn){btn.disabled=false;btn.textContent=lbl||'Bajar datos (JSON)';}}
}
async function exportarArchivos(btn){
 if(!IS_ADMIN){alert('Solo el administrador puede exportar los archivos.');return;}
 if(typeof JSZip==='undefined'){alert('No cargó la librería de compresión. Recarga e intenta de nuevo.');return;}
 var lbl=btn?btn.textContent:'';if(btn){btn.disabled=true;}
 try{
  var zip=new JSZip();var items=[];
  var cvs=await _dumpTabla('candidatos');if(Array.isArray(cvs))cvs.forEach(function(c){if(c.cv_path)items.push({bucket:'cvs',path:c.cv_path,folder:'CVs'});});
  var adj=await _dumpTabla('adjuntos');if(Array.isArray(adj))adj.forEach(function(a){if(a.path)items.push({bucket:'documentos',path:a.path,folder:'Adjuntos'});});
  if(!items.length){alert('No hay archivos (CVs ni adjuntos) para respaldar.');return;}
  var ok=0,fail=0;
  for(var i=0;i<items.length;i++){var it=items[i];if(btn)btn.textContent='Bajando '+(i+1)+'/'+items.length+'…';try{var r=await sb.storage.from(it.bucket).download(it.path);if(r.error||!r.data){fail++;continue;}zip.file(it.folder+'/'+it.path.replace(/\//g,'__'),r.data);ok++;}catch(e){fail++;}}
  if(btn)btn.textContent='Comprimiendo…';var blob=await zip.generateAsync({type:'blob'});
  _bajar('respaldo-archivos-operacion-'+_stamp()+'.zip',blob);
  alert('Archivos respaldados: '+ok+' ok'+(fail?(', '+fail+' no se pudieron bajar'):'')+'.');
 }catch(e){alert('Error al respaldar archivos: '+(e.message||e));}
 finally{if(btn){btn.disabled=false;btn.textContent=lbl||'Bajar archivos (ZIP)';}}
}
function abrirRespaldo(){
 if(!IS_ADMIN){alert('Solo el administrador puede respaldar.');return;}
 openModal('<h3>Respaldo de Operación</h3><div class="hint" style="margin-bottom:10px">Baja tu copia antes de cada cambio. Los <b>datos</b> (proyectos, candidatos, pipeline, etapas, hitos, referencias) van en un JSON. Los <b>archivos</b> (CVs y adjuntos) van aparte en un ZIP.</div><div style="display:flex;flex-direction:column;gap:8px"><button class="btn" onclick="exportarRespaldoDatos(this)">Bajar datos (JSON)</button><button class="btn g" onclick="exportarArchivos(this)">Bajar archivos · CVs y adjuntos (ZIP)</button></div><div style="text-align:right;margin-top:12px"><button class="btn ghost sm" onclick="closeOv()">Cerrar</button></div>');
}

/* Valida que la fecha de una etapa no sea anterior a una etapa previa ya fechada */
async function fechaEtapaOK(id,eid,fecha){
 if(!fecha)return {ok:true};
 var et=(await sb.from('proyecto_etapas').select('id,orden,etapa_nombre,fin_at').eq('proyecto_id',id).order('orden')).data||[];
 var cur=et.find(function(e){return e.id===eid;});if(!cur)return {ok:true};
 var tope=null,topeNom='';
 et.forEach(function(e){if((e.orden||0)<(cur.orden||0)&&e.fin_at){var f=String(e.fin_at).slice(0,10);if(!tope||f>tope){tope=f;topeNom=e.etapa_nombre;}}});
 if(tope&&fecha<tope)return {ok:false,msg:'La fecha de "'+(cur.etapa_nombre||'esta etapa')+'" ('+fecha+') no puede ser anterior a "'+topeNom+'" ('+tope+'). Corrige primero la etapa previa.'};
 return {ok:true};
}

/* Reparto de honorarios editable (agregar / quitar / cambiar % de consultores) */
var RAS=[];
async function editReparto(id){
 try{
  var p=(await sb.from('proyectos').select('cliente,cargo,asignaciones').eq('id',id).single()).data;
  RAS=(p.asignaciones||[]).map(function(a){return {ejecutivo:a.ejecutivo,pe:a.pct_ejecucion||0,pc:a.pct_comercial||0};});
  if(!RAS.length)RAS=[{ejecutivo:'',pe:0,pc:0}];
  openModal('<h3>Reparto de honorarios</h3><div class="hint">'+esc(p.cliente)+' · '+esc(p.cargo)+'. Ajusta el % de cada consultor, agrega quien entra a apoyar o quita quien sale. El total debería sumar 100%.</div><div id="ras_list" style="margin-top:10px"></div><div style="margin-top:6px"><button class="btn ghost sm" onclick="rasAdd()">+ Agregar consultor</button></div><div id="ras_tot" style="margin-top:8px"></div><div style="text-align:right;margin-top:12px"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" onclick="saveReparto('+id+')">Guardar reparto</button></div>');
  rasRender();
 }catch(e){alert(e.message||e);}

function rasRender(){var h='';RAS.forEach(function(a,i){h+='<div style="display:grid;grid-template-columns:1fr 84px 84px 32px;gap:6px;margin-bottom:6px;align-items:center"><select onchange="rasSet('+i+',\'ejecutivo\',this.value)">'+ejecOpts(a.ejecutivo)+'</select><input type="number" placeholder="% ejec" value="'+(a.pe||'')+'" onchange="rasSet('+i+',\'pe\',this.value)"><input type="number" placeholder="% com" value="'+(a.pc||'')+'" onchange="rasSet('+i+',\'pc\',this.value)"><button class="btn ghost sm" onclick="rasDel('+i+')" title="Quitar">\u2715</button></div>';});el('ras_list').innerHTML=h;rasTot();}
function rasSet(i,k,v){RAS[i][k]=(k==='ejecutivo')?v:(parseInt(v)||0);rasTot();}
function rasAdd(){RAS.push({ejecutivo:'',pe:0,pc:0});rasRender();}
function rasDel(i){RAS.splice(i,1);if(!RAS.length)RAS=[{ejecutivo:'',pe:0,pc:0}];rasRender();}
function rasTot(){var pe=0,pc=0;RAS.forEach(function(a){if(a.ejecutivo){pe+=a.pe;pc+=a.pc;}});var t=pe+pc;el('ras_tot').innerHTML='Total: <b>'+t+'%</b>'+(t!==100?' <span style="color:var(--red)">(debe sumar 100%)</span>':' \u2713');}
async function saveReparto(id){
 var asg=RAS.filter(function(a){return a.ejecutivo;}).map(function(a){return {ejecutivo:a.ejecutivo,pct_ejecucion:a.pe,pct_comercial:a.pc};});
 var tot=0;asg.forEach(function(a){tot+=a.pct_ejecucion+a.pct_comercial;});
 if(asg.length&&tot!==100){if(!confirm('El reparto suma '+tot+'%, no 100%. ¿Guardar de todas formas?'))return;}
 try{var r=await sb.from('proyectos').update({asignaciones:asg}).eq('id',id);if(r.error)throw r.error;closeOv();renderProyectoDetalle(id);}catch(e){alert(e.message||e);}
}

 el('app').innerHTML='<div class="empty">Cargando\u2026</div>';
 try{

  var num=function(x){return Number(x)||0;};

  var cset={};hitos.forEach(function(h){if(h.consultor)cset[h.consultor]=true;});

  var filas=[],kPP=0,kPag=0,kBol=0;
  Object.keys(groups).forEach(function(pid){
   var g=groups[pid];if(!g.mine.length)return;var pr=g.p;var exp=pr.linea==='T1'?3:2;
   var slots=[],fact=0;
   for(var n=1;n<=exp;n++){var hi=g.all.filter(function(h){return num(h.numero)===n;})[0]||g.all[n-1]||null;var st='v';if(hi){if(hi.cliente_pago_fecha){st='c';fact++;}else if(hi.hito_4tms_fecha){st='f';fact++;}}slots.push(st);}

   var pct='\u2014';var asig=(pr.asignaciones||[]).filter(function(a){return a.ejecutivo===target;})[0];if(asig)pct=(num(asig.pct_ejecucion)+num(asig.pct_comercial))+'%';

  el('app').innerHTML=h;

 var yesno=function(id,val){return '<select id="'+id+'"><option value="">—</option><option value="si"'+(val==='si'?' selected':'')+'>Sí</option><option value="no"'+(val==='no'?' selected':'')+'>No</option></select>';};

  h+='<div class="fld"><label>¿Quieres que te contactemos?</label>'+yesno('ef_contacto',r.contacto)+'</div>';
 }else{

  h+='<div class="fld"><label>¿Qué podemos mejorar?</label><textarea id="ef_q2">'+esc(r.q2||'')+'</textarea></div>';
  h+='<div class="fld"><label>¿Recomendarías a 4TMS a alguien que está buscando trabajo?</label>'+yesno('ef_recom',r.recom)+'</div>';

 }
 h+='<div class="fld"><label>¿Estarías dispuesto a dar tu testimonio?</label>'+yesno('ef_test',r.test)+'</div>';
 h+='<div class="fld"><label>Si quieres, déjanos tu testimonio</label><textarea id="ef_testtxt">'+esc(r.testtxt||'')+'</textarea></div>';
 h+='<div class="two"><div class="fld"><label>Tu nombre</label><input id="ef_nom" value="'+esc(v.respondente||'')+'"></div><div class="fld"><label>Email (opcional)</label><input id="ef_mail" value="'+esc(v.email||'')+'"></div></div>';
 return h;

function encRecolectar(tipo,pid){
 var g=function(id){var e=el(id);return e?e.value:'';};
 var resp={q1:fix(g('ef_q1')),q2:fix(g('ef_q2')),recom:g('ef_recom'),q3:fix(g('ef_q3')),test:g('ef_test'),testtxt:fix(g('ef_testtxt'))};
 if(tipo==='cliente')resp.contacto=g('ef_contacto');
 var pto=g('ef_pto');
 var comentario=[resp.q1?('Bien/Destaca: '+resp.q1):'',resp.q2?('Mejorar: '+resp.q2):'',resp.q3?('Adicional/Ayuda: '+resp.q3):'',resp.testtxt?('Testimonio: '+resp.testtxt):''].filter(Boolean).join(' | ');
 return {proyecto_id:pid||null,tipo:tipo,puntaje:pto===''?null:parseInt(pto),comentario:comentario||null,respuestas:resp,respondente:fix(g('ef_nom'))||null,email:fix(g('ef_mail'))||null,recomendaria:resp.recom==='si'?true:(resp.recom==='no'?false:null),quiere_contacto:resp.contacto==='si'?true:null,acepta_testimonio:resp.test==='si'?true:(resp.test==='no'?false:null),fecha:today()};
}

/* ================= BATCH 2b · Boletas + Placements + Cierre + Rojo por vencido ================= */

/* Helper de subida a un bucket, devuelve el path */
async function _subirDoc(bucket,prefix,file){if(!file)return null;var safe=file.name.replace(/[^\w.\-]/g,'_');var path=prefix+Date.now()+'_'+safe;var ru=await sb.storage.from(bucket).upload(path,file);if(ru.error)throw ru.error;return path;}

/* --- Rojo cuando no se cumple el plazo comprometido de la etapa --- */
function etpVencidaInfo(e){
 var plazo=e.plazo_at?String(e.plazo_at).slice(0,10):null;if(!plazo)return {cls:'',badge:''};
 var fin=e.fin_at?String(e.fin_at).slice(0,10):null,hoy=today();
 if(e.estado==='hecho'){
  if(fin&&fin>plazo)return {cls:' vencida',badge:'<span class="tag" style="background:var(--red)">Fuera de plazo (comp. '+plazo+')</span>'};
  return {cls:'',badge:'<span class="badge" style="background:#eaf5e0;color:#3d6b16">En plazo</span>'};
 }
 if(hoy>plazo)return {cls:' vencida',badge:'<span class="tag" style="background:var(--red)">Vencida · comp. '+plazo+'</span>'};
 return {cls:'',badge:'<span class="badge">Comp. '+plazo+'</span>'};
}

/* --- Boletas del consultor por hito (el consultor sube la suya; nunca la factura del cliente) --- */
function boletasHito(adj,hid,id){
 var bs=adj.filter(function(a){return a.hito_id===hid;});
 var h='<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center"><span class="hint">Boletas del consultor:</span>';
 if(!bs.length)h+='<span class="muted" style="font-size:12px">sin boleta</span>';
 bs.forEach(function(a){h+='<span class="badge">'+esc(a.subido_por||'consultor')+' <button class="btn ghost sm" style="padding:1px 6px" onclick="verAdj(\''+esc(a.path)+'\')">ver</button>'+(IS_ADMIN?' <button class="btn ghost sm" style="padding:1px 6px" onclick="borrarAdj('+a.id+','+id+')">\u2715</button>':'')+'</span>';});
 h+=' <button class="btn ghost sm" onclick="adjBoleta('+id+','+hid+')">+ Boleta</button></div>';

}
function adjBoleta(id,hid){openModal('<h3>Subir boleta del consultor</h3><div class="hint">Cada consultor sube su propia boleta de este hito. La factura del cliente no se sube aquí.</div><div class="fld"><label>Archivo (PDF o imagen)</label><input type="file" id="bo_file" accept=".pdf,.jpg,.jpeg,.png"></div><div class="hint" id="bo_msg"></div><div style="text-align:right;margin-top:6px"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" id="bo_btn" onclick="subirBoleta('+id+','+hid+')">Subir</button></div>');}
async function subirBoleta(id,hid){var f=el('bo_file').files[0];if(!f){alert('Elige un archivo.');return;}el('bo_btn').disabled=true;el('bo_msg').textContent='Subiendo…';try{var path=await _subirDoc('documentos','proyecto_'+id+'/boleta_',f);var r=await sb.from('adjuntos').insert({proyecto_id:id,hito_id:hid,tipo:'boleta',nombre:f.name,path:path,subido_por:meNombre()});if(r.error)throw r.error;closeOv();renderProyectoDetalle(id);}catch(e){el('bo_btn').disabled=false;el('bo_msg').textContent='Error: '+(e.message||e);}}

async function renderPlacements(){
 el('app').innerHTML='<div class="empty">Cargando placements…</div>';
 try{
  var pls=(await sb.from('placements').select('*').order('fecha_ingreso',{ascending:false})).data||[];
  var h='<div class="bar"><div style="font-size:18px;font-weight:bold;color:var(--navy)">Placements</div><button class="btn g sm" style="margin-left:auto" onclick="nuevoPlacement(\'\')">+ Agregar placement</button></div>';
  if(!pls.length){h+='<div class="card"><div class="empty">Aún no hay placements. Se crean al cerrar un proyecto T1 (carta + CV + fecha de ingreso) o los agregas manualmente aquí.</div></div>';el('app').innerHTML=h;return;}
  var hoy=new Date();var mesAct=hoy.toISOString().slice(0,7);var anioAct=String(hoy.getFullYear());
  var esteMes=pls.filter(function(p){return p.fecha_ingreso&&String(p.fecha_ingreso).slice(0,7)===mesAct;}).length;
  var esteAnio=pls.filter(function(p){return p.fecha_ingreso&&String(p.fecha_ingreso).slice(0,4)===anioAct;}).length;
  var cliSet={};pls.forEach(function(p){cliSet[p.cliente||'—']=1;});
  h+='<div class="kpis"><div class="kpi g"><div class="l">Total</div><div class="v">'+pls.length+'</div></div><div class="kpi n"><div class="l">Este mes</div><div class="v">'+esteMes+'</div></div><div class="kpi m"><div class="l">Este año</div><div class="v">'+esteAnio+'</div></div><div class="kpi"><div class="l">Clientes</div><div class="v">'+Object.keys(cliSet).length+'</div></div></div>';
  var meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var mesTxt=function(d){if(!d)return '—';var a=String(d).slice(0,10).split('-');return a.length>=2?(meses[parseInt(a[1])-1]+' '+a[0]):String(d).slice(0,10);};
  h+='<div class="sec">Resumen · cliente · consultor · mes</div><div class="card"><table><thead><tr><th>Cliente</th><th>Placement</th><th>Cargo</th><th>Consultor</th><th>Ingreso</th><th>Docs</th></tr></thead><tbody>';
  pls.forEach(function(pl){h+='<tr><td><b>'+esc2(pl.cliente)+'</b></td><td>'+esc2(pl.nombre)+'</td><td class="muted">'+esc2(pl.cargo)+'</td><td>'+(pl.consultor?'<span class="gest" style="background:'+ecolor(pl.consultor)+'">'+esc(pl.consultor)+'</span>':'<span class="muted">—</span>')+'</td><td>'+mesTxt(pl.fecha_ingreso)+'</td><td style="white-space:nowrap">'+(pl.carta_path?'<button class="btn ghost sm" style="padding:2px 7px" onclick="verAdj(\''+esc(pl.carta_path)+'\')">Carta</button> ':'')+(pl.cv_path?'<button class="btn ghost sm" style="padding:2px 7px" onclick="verCV(\''+esc(pl.cv_path)+'\')">CV</button> ':'')+(IS_ADMIN?'<button class="btn ghost sm" style="padding:2px 7px" onclick="delPlacement('+pl.id+')">✕</button>':'')+'</td></tr>';});
  h+='</tbody></table></div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty" style="color:var(--red)">Error: '+esc(e.message||e)+' — ¿corriste el SQL que crea la tabla placements?</div></div>';}
}

function nuevoPlacement(cliente){openModal('<h3>Agregar placement</h3>'+plFields({cliente:cliente})+'<div class="hint" id="pl_msg"></div><div style="text-align:right;margin-top:8px"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" id="pl_btn" onclick="savePlacement()">Guardar</button></div>');}

/* --- Cierre de proyecto: obligatorio dejar el placement (carta + CV + fecha de ingreso) --- */
async function abrirCierreProyecto(id){
 try{
  var p=(await sb.from('proyectos').select('cliente,cargo').eq('id',id).single()).data;
  var col=(await sb.from('candidatos_proyecto').select('*').eq('proyecto_id',id).eq('estado','colocado').limit(1)).data||[];
  var pre=col[0]||{};
  window._cierrePre={cv_path:pre.cv_path||null};
  openModal('<h3>Cerrar proyecto · dejar el placement</h3><div class="hint">Para cerrar es obligatorio dejar la <b>carta de oferta</b>, el <b>CV</b> y la <b>fecha de ingreso</b> del placement. Queda guardado y separado por cliente.'+(pre.cv_path?' El colocado ya tiene un CV cargado; si no subes otro, se reutiliza.':'')+'</div>'+plFields({cliente:p.cliente,nombre:pre.nombre||'',cargo:pre.cargo||p.cargo,consultor:pre.responsable||meNombre()})+'<div class="hint" id="pl_msg"></div><div style="display:flex;justify-content:space-between;margin-top:10px"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn g sm" id="pl_btn" onclick="cerrarConPlacement('+id+')">Guardar placement y cerrar</button></div>');
 }catch(e){alert(e.message||e);}
}
async function cerrarConPlacement(id){
 var nom=fix(el('pl_nom').value),cargo=fix(el('pl_cargo').value),fecha=el('pl_fecha').value;
 var cartaF=el('pl_carta').files[0],cvF=el('pl_cv').files[0];
 var preCV=(window._cierrePre&&window._cierrePre.cv_path)||null;
 if(!nom){el('pl_msg').textContent='Falta el nombre del placement.';return;}
 if(!fecha){el('pl_msg').textContent='Falta la fecha de ingreso.';return;}
 if(!cartaF){el('pl_msg').textContent='Falta la carta de oferta (obligatoria para cerrar).';return;}
 if(!cvF&&!preCV){el('pl_msg').textContent='Falta el CV del placement (obligatorio para cerrar).';return;}
 el('pl_btn').disabled=true;el('pl_msg').textContent='Guardando…';
 try{
  var carta=await _subirDoc('documentos','placements/carta_',cartaF);
  var cv=cvF?await _subirDoc('cvs','placements/cv_',cvF):preCV;
  var row={proyecto_id:id,cliente:fix(el('pl_cli').value)||null,nombre:nom,cargo:cargo||null,fecha_ingreso:fecha,consultor:el('pl_cons').value||null,renta:fix(el('pl_renta').value)||null,carta_path:carta,cv_path:cv};
  var r=await sb.from('placements').insert(row);if(r.error)throw r.error;
  await sb.from('proyectos').update({estado:'cerrado',cerrado_at:today()}).eq('id',id);
  closeOv();renderProyectoDetalle(id);
 }catch(e){el('pl_btn').disabled=false;el('pl_msg').textContent='Error: '+(e.message||e);}
}

/* ciclo: avance + reloj a partir de las FECHAS de hito cumplido */
function computeCiclo(etp,p){
 var total=etp.length,hitoOrden=null;etp.forEach(function(e){if(e.hito&&hitoOrden===null)hitoOrden=e.orden;});
 var core=etp.filter(function(e){return hitoOrden===null||e.orden<=hitoOrden;});
 var hechas=core.filter(function(e){return e.estado==='hecho';}).length;
 var pct=core.length?Math.round(hechas/core.length*100):0;
 var actual=etp.find(function(e){return e.estado!=='hecho';})||null;
 var prox=null;if(actual){var i=etp.indexOf(actual);prox=etp.slice(i+1).find(function(e){return e.estado!=='hecho';})||null;}
 var r4=0,rc=0;var prev=(p&&p.kickoff_at)?String(p.kickoff_at).slice(0,10):null;
 core.slice().sort(function(a,b){return (a.orden||0)-(b.orden||0);}).forEach(function(e){var f=e.fin_at?String(e.fin_at).slice(0,10):null;if(e.estado==='hecho'&&f){if(prev){var d=daysBetween(prev,f);if(e.lado==='cliente')rc+=d;else r4+=d;}prev=f;}});
 if(actual&&prev){var d=daysBetween(prev,today());if(actual.lado==='cliente')rc+=d;else r4+=d;}
 var pelota=actual?(actual.lado==='cliente'?'Cliente':'4TMS'):(total&&hechas>=core.length?'Cerrado':'—');
 return {total:total,coreLen:core.length,hechas:hechas,pct:pct,actual:actual,prox:prox,r4:r4,rc:rc,pelota:pelota,hitoOrden:hitoOrden};
}

    h+='</tbody></table>';}
   h+='</div>';
  }

  // CONSULTORES DEL PROYECTO · reparto de honorarios (editable)
  var _asg=p.asignaciones||[];
  h+='<div class="sec">Consultores del proyecto · reparto de honorarios</div><div class="card">';
  if(!_asg.length){h+='<div class="empty">Sin reparto definido todavía.</div>';}
  else{var _tot=0;h+='<table><thead><tr><th>Consultor</th><th class="r">% Ejecución</th><th class="r">% Comercial</th><th class="r">% Total</th></tr></thead><tbody>';
   _asg.forEach(function(a){var pe=a.pct_ejecucion||0,pc=a.pct_comercial||0,t=pe+pc;_tot+=t;h+='<tr><td><span class="gest" style="background:'+ecolor(a.ejecutivo)+'">'+esc(a.ejecutivo)+'</span>'+(esEmbajador(a.ejecutivo)?' <span class="badge" style="background:#ececff;color:#3b3f8f">embajador</span>':'')+'</td><td class="r">'+pe+'%</td><td class="r">'+pc+'%</td><td class="r"><b>'+t+'%</b></td></tr>';});
   h+='</tbody></table><div class="hint" style="margin-top:6px">Total repartido: <b>'+_tot+'%</b>'+(_tot!==100?' <span style="color:var(--red)">(debería sumar 100%)</span>':' \u2713')+'</div>';}
  h+=(IS_ADMIN?'<div style="text-align:right;margin-top:8px"><button class="btn ghost sm" onclick="editReparto('+id+')">Editar reparto</button></div>':'')+'</div>';

  // HITOS DE FACTURACIÓN (pago consultor editable + emitir factura)
  h+='<div class="sec">Hitos de facturación · boleta del consultor</div><div class="card"><div style="text-align:right;margin-bottom:6px"><button class="btn g sm" onclick="addHito('+id+')">+ Hito</button></div>';

   h+='<div class="'+cls+'"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px"><div><b style="color:var(--navy)">'+esc2(hi.nombre||('Hito '+hi.folio))+'</b> '+(hi.folio?'<span class="hint">Folio '+esc(hi.folio)+'</span>':'')+' <span class="badge">'+esc(hi.estado)+'</span></div><div>'+(hi.factura_solicitada?'<span class="tag" style="background:var(--must);color:#20232e">Factura solicitada</span>':'<button class="btn sm" onclick="emitirFactura('+hi.id+','+id+')">Emitir factura 4TMS</button>')+' <button class="btn ghost sm" onclick="editHito('+hi.id+','+id+')">Editar</button></div></div>';

   h+='<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:8px">'
     +'<span class="tgl">Hito OK '+(hi.hito_ok?'\u2705':'\u2013')+'</span>'
     +'<span class="tgl">Cliente pagó '+(hi.cliente_pago?'\u2705'+(hi.cliente_pago_fecha?' '+esc(hi.cliente_pago_fecha):''):'\u2013')+'</span>'
     +'<span class="tgl">Doc recibido '+(hi.doc_recibido?'\u2705':'\u2013')+'</span>'
     +'<span class="tgl">Consultor pagado '+(hi.consultor_pagado?'\u2705':'\u2013')+'</span></div>'+hitoFechas(hi)+boletasHito(adj,hi.id,id)+'</div>';
  });
  h+='</div>';

  // referencias
  h+='<div class="sec">Referencias laborales</div><div class="card"><div style="text-align:right;margin-bottom:6px"><button class="btn ghost sm" onclick="nuevaRef('+id+')">+ Tomar referencia</button></div>';
  if(!refs.length)h+='<div class="empty">Sin referencias.</div>';else refs.forEach(function(rf){var rp=rf.respuestas||{};h+='<div style="border:1px solid var(--line);border-radius:8px;padding:9px;margin-bottom:6px"><b>'+esc2(rf.candidato)+'</b> <span class="muted">Ref: '+esc2(rf.referente)+'</span><div class="hint">Volvería a contratarlo: <b>'+esc(rp.p5||'—')+'</b></div><button class="btn ghost sm" style="margin-top:4px" onclick="verRef('+rf.id+')">Ver detalle</button></div>';});
  h+='</div>';

  // encuestas
  h+='<div class="sec">Encuestas de satisfacción</div><div class="card"><div style="text-align:right;margin-bottom:6px"><button class="btn ghost sm" onclick="copiarLinkEnc('+id+',\'cliente\')">Link cliente</button> <button class="btn ghost sm" onclick="copiarLinkEnc('+id+',\'candidato\')">Link candidato</button> <button class="btn ghost sm" onclick="cargarEncHistorica('+id+')">Cargar previa</button> <button class="btn ghost sm" onclick="nuevaEnc('+id+')">+ Registrar</button></div>';
  if(!enc.length)h+='<div class="empty">Sin encuestas.</div>';else{h+='<table><thead><tr><th>Tipo</th><th>Puntaje</th><th>Comentario</th><th>Fecha</th></tr></thead><tbody>';enc.forEach(function(en){h+='<tr><td>'+esc(en.tipo)+'</td><td><b>'+(en.puntaje!=null?en.puntaje+'/10':'—')+'</b></td><td>'+esc2(en.comentario)+'</td><td class="muted">'+esc(String(en.fecha||'').slice(0,10))+'</td></tr>';});h+='</tbody></table>';}
  h+='</div>';

 }catch(e){el('app').innerHTML='<div class="card"><div class="empty" style="color:var(--red)">Error: '+esc(e.message||e)+'</div></div>';}

/* etapas: switch + fecha */
async function etpToggle(eid,done,id){try{var u={estado:done?'hecho':'pendiente'};if(done){var e=(await sb.from('proyecto_etapas').select('fin_at,hito').eq('id',eid).single()).data;if(!e.fin_at)u.fin_at=today();if(e.hito&&(e.fin_at||u.fin_at))await sb.from('proyectos').update({exito_at:e.fin_at?String(e.fin_at).slice(0,10):today()}).eq('id',id);}var r=await sb.from('proyecto_etapas').update(u).eq('id',eid);if(r.error)throw r.error;renderProyectoDetalle(id);}catch(e){alert(e.message||e);}}
async function etpFecha(eid,fecha,id){try{var v=await fechaEtapaOK(id,eid,fecha);if(!v.ok){alert(v.msg);renderProyectoDetalle(id);return;}await sb.from('proyecto_etapas').update({fin_at:fecha||null}).eq('id',eid);renderProyectoDetalle(id);}catch(e){alert(e.message||e);}}
function nuevaEtapa(id,orden){openModal('<h3>Nueva etapa</h3><div class="fld"><label>Nombre</label><input id="ne_nom"></div><div class="two"><div class="fld"><label>Lado (reloj)</label><select id="ne_lado"><option value="4tms">4TMS</option><option value="cliente">Cliente</option></select></div><div class="fld"><label>Responsable</label><select id="ne_resp">'+ejecOpts('')+'</select></div></div><div class="fld"><label>Fecha compromiso (opcional, para alerta de atraso)</label><input type="date" id="ne_plazo"></div><div class="fld"><label><input type="checkbox" id="ne_hito" style="width:auto"> Es el hito de éxito</label></div><div style="text-align:right"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" onclick="saveNuevaEtapa('+id+','+orden+')">Guardar</button></div>');}
async function saveNuevaEtapa(id,orden){var nom=fix(el('ne_nom').value);if(!nom){alert('Nombre.');return;}try{var r=await sb.from('proyecto_etapas').insert({proyecto_id:id,etapa:orden,orden:orden,etapa_nombre:nom,lado:el('ne_lado').value,responsable:el('ne_resp').value||null,hito:el('ne_hito').checked,plazo_at:(el('ne_plazo')?el('ne_plazo').value||null:null),estado:'pendiente'});if(r.error)throw r.error;closeOv();renderProyectoDetalle(id);}catch(e){alert(e.message||e);}}
async function editEtapa(eid,id){var e=(await sb.from('proyecto_etapas').select('*').eq('id',eid).single()).data;openModal('<h3>Editar etapa</h3><div class="fld"><label>Nombre</label><input id="ee_nom" value="'+esc(e.etapa_nombre||'')+'"></div><div class="two"><div class="fld"><label>Lado (reloj)</label><select id="ee_lado"><option value="4tms"'+(e.lado!=='cliente'?' selected':'')+'>4TMS</option><option value="cliente"'+(e.lado==='cliente'?' selected':'')+'>Cliente</option></select></div><div class="fld"><label>Responsable</label><select id="ee_resp">'+ejecOpts(e.responsable)+'</select></div></div><div class="two"><div class="fld"><label>Fecha cumplida</label><input type="date" id="ee_fin" value="'+(e.fin_at?String(e.fin_at).slice(0,10):'')+'"></div><div class="fld"><label>Fecha compromiso (alerta de atraso)</label><input type="date" id="ee_plazo" value="'+(e.plazo_at?String(e.plazo_at).slice(0,10):'')+'"></div></div><div class="fld"><label>Nota</label><textarea id="ee_nota">'+esc(e.nota||'')+'</textarea></div><div class="fld"><label><input type="checkbox" id="ee_hito" style="width:auto" '+(e.hito?'checked':'')+'> Hito de éxito</label></div><div style="text-align:right"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" onclick="saveEditEtapa('+eid+','+id+')">Guardar</button></div>');}
async function saveEditEtapa(eid,id){var u={etapa_nombre:fix(el('ee_nom').value),lado:el('ee_lado').value,responsable:el('ee_resp').value||null,fin_at:el('ee_fin').value||null,plazo_at:el('ee_plazo').value||null,nota:fix(el('ee_nota').value),hito:el('ee_hito').checked};try{var v=await fechaEtapaOK(id,eid,u.fin_at);if(!v.ok){alert(v.msg);return;}var r=await sb.from('proyecto_etapas').update(u).eq('id',eid);if(r.error)throw r.error;if(u.hito){await sb.from('proyecto_etapas').update({hito:false}).eq('proyecto_id',id).neq('id',eid);}closeOv();renderProyectoDetalle(id);}catch(e){alert(e.message||e);}}
async function delEtapa(eid,id){if(!confirm('¿Borrar esta etapa?'))return;try{await sb.from('proyecto_etapas').delete().eq('id',eid);renderProyectoDetalle(id);}catch(e){alert(e.message||e);}}
function adjEtapa(id,eid){openModal('<h3>Adjuntar a la etapa</h3><div class="fld"><label>Tipo</label><select id="aj_tipo"><option value="cv">CV</option><option value="informe">Informe</option><option value="otro">Otro</option></select></div><div class="fld"><label>Archivo</label><input type="file" id="aj_file" accept=".pdf,.doc,.docx,.xlsx,.pptx"></div><div class="hint" id="aj_msg"></div><div style="text-align:right;margin-top:6px"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" id="aj_btn" onclick="subirAdj('+id+','+eid+')">Subir</button></div>');}
async function subirAdj(id,eid){var f=el('aj_file').files[0];if(!f){alert('Elige un archivo.');return;}el('aj_btn').disabled=true;el('aj_msg').textContent='Subiendo…';try{var safe=f.name.replace(/[^\w.\-]/g,'_');var path='proyecto_'+id+'/'+Date.now()+'_'+safe;var ru=await sb.storage.from('documentos').upload(path,f);if(ru.error)throw ru.error;var r=await sb.from('adjuntos').insert({proyecto_id:id,etapa_id:eid,tipo:el('aj_tipo').value,nombre:f.name,path:path,subido_por:meNombre()});if(r.error)throw r.error;closeOv();renderProyectoDetalle(id);}catch(e){el('aj_btn').disabled=false;el('aj_msg').textContent='Error: '+(e.message||e);}}
async function verAdj(path){try{var r=await sb.storage.from('documentos').createSignedUrl(path,3600);if(r.error)throw r.error;window.open(r.data.signedUrl,'_blank');}catch(e){alert('No se pudo abrir: '+(e.message||e));}}
async function borrarAdj(aid,id){if(!confirm('¿Borrar adjunto?'))return;try{await sb.from('adjuntos').delete().eq('id',aid);renderProyectoDetalle(id);}catch(e){alert(e.message||e);}}
async function verCV(path){try{var r=await sb.storage.from('cvs').createSignedUrl(path,3600);if(r.error)throw r.error;window.open(r.data.signedUrl,'_blank');}catch(e){alert('No se pudo abrir el CV: '+(e.message||e));}}

function posMercado(cg){
 var a=Number(cg.renta_actual)||0;if(!a)return '<span class="muted">—</span>';
 var lo=Number(cg.renta_p25)||Number(cg.renta_min)||0;var med=Number(cg.renta_mediana)||0;var hi=Number(cg.renta_p75)||Number(cg.renta_max)||0;
 var lbl,col;
 if(lo&&a<lo){lbl='Bajo mercado';col='#c0392b';}
 else if(med&&a<med){lbl='Bajo la mediana';col='#D8A828';}
 else if(hi&&a<=hi){lbl='En rango';col='#6FA52C';}
 else if(hi&&a>hi){lbl='Sobre mercado';col='#22255A';}
 else {lbl='En rango';col='#6FA52C';}
 return '<span class="tag" style="background:'+col+'">'+lbl+'</span>';
}
function posMercadoTxt(cg){var t=posMercado(cg);var m=t.match(/>([^<]+)</);return m?m[1]:'—';}

 +'<div class="sec" style="margin:10px 0 4px">Banda de mercado</div><div class="three"><div class="fld"><label>Mínimo</label><input type="number" id="cg_min" value="'+(cg.renta_min||'')+'"></div><div class="fld"><label>P25</label><input type="number" id="cg_p25" value="'+(cg.renta_p25||'')+'"></div><div class="fld"><label>Mediana</label><input type="number" id="cg_med" value="'+(cg.renta_mediana||'')+'"></div></div>'

  var vig=((await sb.from('proyectos').select('id,cliente,cargo,linea,estado')).data||[]).filter(esVigente);
  var h='<div class="bar"><button class="btn g sm" onclick="nuevaProactiva()">+ Nueva entrevista proactiva</button></div><div class="hint" style="margin-bottom:8px">Candidatos ya entrevistados de forma proactiva. Al final se asignan a un proyecto vigente.</div><div class="card"><table><thead><tr><th>Candidato</th><th>Área / cargo</th><th>Rating</th><th>CV</th><th>LinkedIn</th><th>Entrevista</th><th></th></tr></thead><tbody>';
  if(!all.length)h+='<tr><td colspan=7 class="empty">Aún no hay entrevistas proactivas. Se generan desde la ficha de un candidato en BBDD.</td></tr>';
  all.forEach(function(c){var pa=c.pauta||{};h+='<tr><td><b>'+esc2(c.nombre)+'</b>'+(c.renta?'<div class="hint">Renta: '+esc(c.renta)+'</div>':'')+'</td><td class="muted">'+esc(c.area||'')+(c.cargo_interes?' · '+esc2(c.cargo_interes):'')+'</td><td>'+stars(pa.rating)+'</td><td>'+(c.cv_path?'<button class="btn ghost sm" onclick="verCV(\''+esc(c.cv_path)+'\')">CV</button>':'—')+'</td><td>'+(c.linkedin?'<a href="'+esc(c.linkedin)+'" target="_blank">in \u2197</a>':'—')+'</td><td class="muted">'+esc(c.entrevistada_at||'')+'</td><td><button class="btn ghost sm" onclick="fichaCand('+c.id+')">Ver</button> <button class="btn g sm" onclick="asignarProy('+c.id+')"'+(vig.length?'':' disabled')+'>Asignar</button></td></tr>';});
  h+='</tbody></table>'+(vig.length?'':'<div class="hint" style="margin-top:8px">No hay proyectos vigentes para asignar.</div>')+'</div>';el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty" style="color:var(--red)">Error: '+esc(e.message||e)+'</div></div>';}
}
async function asignarProy(cid){var c=(await sb.from('candidatos').select('*').eq('id',cid).single()).data;var vig=((await sb.from('proyectos').select('id,cliente,cargo,linea,estado')).data||[]).filter(esVigente);var h='<h3>Asignar a proyecto vigente</h3><div class="muted" style="margin-bottom:8px">'+esc2(c.nombre)+'</div><div class="fld"><label>Proyecto</label><select id="ap_proy"><option value="">— elige —</option>'+vig.map(function(p){return '<option value="'+p.id+'">'+esc2(p.cliente)+' · '+esc2(p.cargo)+' ('+esc(p.linea)+')</option>';}).join('')+'</select></div><div style="text-align:right"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" onclick="doAsignar('+cid+')">Asignar</button></div>';openModal(h);}
async function doAsignar(cid){var pid=el('ap_proy').value;if(!pid){alert('Elige un proyecto.');return;}var c=(await sb.from('candidatos').select('nombre,cargo_interes,linkedin,renta,cv_path,origen').eq('id',cid).single()).data;try{await sb.from('candidatos_proyecto').insert({proyecto_id:parseInt(pid),candidato_id:cid,nombre:c.nombre,cargo:c.cargo_interes,fuente:c.origen||'Proactiva',estado:'presentado',linkedin:c.linkedin,renta:c.renta,cv_path:c.cv_path,responsable:meNombre(),fecha:today()});await sb.from('candidatos').update({estado:'en_proceso',updated_at:new Date().toISOString()}).eq('id',cid);closeOv();alert('Asignado al pipeline del proyecto.');renderProactivas();}catch(e){alert(e.message||e);}}

function nuevaProactiva(){
 var h='<h3>Nueva entrevista proactiva</h3><div class="sec" style="margin-top:0">Datos del candidato</div>'
  +'<div class="two"><div class="fld"><label>Nombre</label><input id="pr_nom"></div><div class="fld"><label>Cargo actual</label><input id="pr_cargo"></div></div>'
  +'<div class="two"><div class="fld"><label>Empresa actual</label><input id="pr_emp"></div><div class="fld"><label>Ejecutivo 4TMS</label><select id="pr_resp">'+ejecOpts(meNombre())+'</select></div></div>'
  +'<div class="two"><div class="fld"><label>Área / industria</label><input id="pr_area"></div><div class="fld"><label>Fuente / cómo llegamos</label><input id="pr_fuente"></div></div>'
  +'<div class="two"><div class="fld"><label>LinkedIn (URL)</label><input id="pr_lk"></div><div class="fld"><label>Renta / expectativa</label><input id="pr_renta"></div></div>'
  +'<div class="sec">Pauta</div>';
 PAUTA.forEach(function(q){h+='<div class="fld"><label>'+q[1]+'</label><textarea id="pr_'+q[0]+'"></textarea></div>';});
 h+='<div class="two"><div class="fld"><label>Rating (1–5)</label><select id="pr_rating"><option value="">—</option>'+[1,2,3,4,5].map(function(n){return '<option>'+n+'</option>';}).join('')+'</select></div><div class="fld"><label>Evaluación</label><select id="pr_eval"><option value="">—</option>'+['Muy buena','Buena','Regular','No avanza'].map(function(x){return '<option>'+x+'</option>';}).join('')+'</select></div></div>';
 h+='<div style="text-align:right;margin-top:8px"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn g sm" onclick="saveNuevaProactiva()">Guardar en Entrevistas (CRM)</button></div>';
 openModal(h);
}
async function saveNuevaProactiva(){
 var nom=fix(el('pr_nom').value);if(!nom){alert('Nombre.');return;}
 var pa={};PAUTA.forEach(function(q){pa[q[0]]=fix(el('pr_'+q[0]).value);});
 pa.rating=el('pr_rating').value?parseInt(el('pr_rating').value):null;pa.eval=el('pr_eval').value;pa.empresa=fix(el('pr_emp').value);
 var row={nombre:nom,cargo_interes:fix(el('pr_cargo').value),area:fix(el('pr_area').value)||null,origen:fix(el('pr_fuente').value)||'Proactiva',linkedin:fix(el('pr_lk').value),renta:fix(el('pr_renta').value),responsable:el('pr_resp').value||meNombre(),pauta:pa,entrevistada_at:today(),estado:'revisado'};
 try{var r=await sb.from('candidatos').insert(row);if(r.error)throw r.error;closeOv();renderProactivas();}catch(e){alert(e.message||e);}
}

/* ===================== ENCUESTAS (tab) ===================== */
async function renderEncuestas(){
 el('app').innerHTML='<div class="empty">Cargando…</div>';
 try{
  var enc=(await sb.from('encuestas').select('*').order('created_at',{ascending:false})).data||[];
  var proy=(await sb.from('proyectos').select('id,cliente,cargo')).data||[];var pm={};proy.forEach(function(p){pm[p.id]=p;});
  var cli=enc.filter(function(e){return e.tipo==='cliente'&&e.puntaje!=null;});var cand=enc.filter(function(e){return e.tipo==='candidato'&&e.puntaje!=null;});
  var prom=function(a){if(!a.length)return '—';return (a.reduce(function(s,x){return s+x.puntaje;},0)/a.length).toFixed(1)+'/10';};
  var h=encLinksCard(proy);
  h+='<div class="kpis"><div class="kpi g"><div class="l">Prom. cliente</div><div class="v">'+prom(cli)+'</div></div><div class="kpi m"><div class="l">Prom. candidato</div><div class="v">'+prom(cand)+'</div></div><div class="kpi n"><div class="l">Encuestas cliente</div><div class="v">'+cli.length+'</div></div><div class="kpi"><div class="l">Encuestas candidato</div><div class="v">'+cand.length+'</div></div></div>';
  h+='<div class="sec">Todas las respuestas</div><div class="card"><table><thead><tr><th>Proyecto</th><th>Tipo</th><th>Puntaje</th><th>Comentario</th><th>Fecha</th><th></th></tr></thead><tbody>';
  if(!enc.length)h+='<tr><td colspan=5 class="empty">Sin encuestas registradas.</td></tr>';
  enc.forEach(function(e){var p=pm[e.proyecto_id];h+='<tr><td><b>'+(p?esc2(p.cliente):'—')+'</b><div class="hint">'+(p?esc2(p.cargo):'')+'</div></td><td>'+esc(e.tipo)+'</td><td><b>'+(e.puntaje!=null?e.puntaje+'/10':'—')+'</b></td><td class="muted">'+esc2(e.comentario)+'</td><td class="muted">'+esc(String(e.fecha||'').slice(0,10))+'</td>'+(IS_ADMIN?'<td><button class="btn ghost sm" onclick="delEncuesta('+e.id+')" title="Eliminar">\u2715</button></td>':'<td></td>')+'</tr>';});
  h+='</tbody></table></div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty" style="color:var(--red)">Error: '+esc(e.message||e)+'</div></div>';}
}
function copiar(t){try{navigator.clipboard.writeText(t);alert('Link copiado.');}catch(e){prompt('Copia el link:',t);}}

/* ===================== GENERADORES (tab) ===================== */
function renderGeneradores(){
 var h='<div class="hint" style="margin-bottom:10px">Tus generadores, integrados en la app. Abren en pestaña nueva con el motor de exportación: las láminas descargan en PDF <b>exactamente como se ven</b>, sin páginas en blanco.</div>';
 GENS_EMBED.forEach(function(g){h+='<div class="genrow"><div><b style="color:var(--navy)">'+esc(g.nombre)+'</b><div class="hint">'+esc(GEN_DESC[g.key]||'')+'</div></div><button class="btn sm" onclick="openGenerador(\''+g.key+'\')">Abrir</button></div>';});h+='<div class="genrow"><div><b style="color:var(--navy)">Link que nutre la BBDD</b><div class="hint">Formulario público de postulación &rarr; entra a tus candidatos</div></div><button class="btn ghost sm" onclick="copiarLinkBBDD()">Copiar link</button></div>';
 el('app').innerHTML=h;
}

/* ===================== INIT ===================== */
function waitSDK(ms){return new Promise(function(r){var t=Date.now();(function c(){if(window.supabase&&window.supabase.createClient)return r(true);if(Date.now()-t>ms)return r(false);setTimeout(c,80);})();});}
(async function(){var ok=await waitSDK(8000);if(!ok){el('root').innerHTML='<div class="card login"><div class="empty" style="color:var(--red)">No cargó la librería. Recarga.</div></div>';return;}sb=window.supabase.createClient(SUPA_URL,SUPA_ANON);await boot();})();
</script>
