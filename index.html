<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>4TMS · Operación</title>
<style>
:root{--navy:#22255A;--must:#D8A828;--green:#6FA52C;--ink:#20232e;--mut:#6b7280;--line:#e3e6ef;--bg:#f4f5f9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
header{background:var(--navy);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
header .logo{font-weight:bold;font-size:18px}header .logo span{color:var(--must)}
header .who{margin-left:auto;font-size:12px;color:#c7cbe0;display:flex;align-items:center;gap:10px}
.tabs{background:#fff;border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 12px;position:sticky;top:48px;z-index:19;overflow-x:auto}
.tabs button{border:none;background:none;padding:12px 14px;font-size:14px;color:var(--mut);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tabs button.on{color:var(--navy);font-weight:bold;border-bottom-color:var(--must)}
.main{max-width:1080px;margin:0 auto;padding:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:0 4px 14px rgba(20,22,40,.04);margin-bottom:14px}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.search{flex:1;min-width:180px;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:14px}
select,input,textarea{border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:14px;font-family:inherit;background:#fff}
textarea{width:100%;min-height:64px;resize:vertical}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
th{color:var(--mut);font-weight:bold;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
.btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:bold;cursor:pointer}
.btn.g{background:var(--green)}.btn.m{background:var(--must);color:#20232e}.btn.danger{background:#c0392b}
.btn.ghost{background:#eef0f7;color:var(--navy)}.btn.sm{padding:6px 9px;font-size:12px}
.btn:disabled{opacity:.55;cursor:default}
.empty{color:var(--mut);text-align:center;padding:22px}
.muted{color:var(--mut)}.hint{font-size:12px;color:var(--mut)}
.fld{margin:8px 0}.fld label{display:block;font-size:12px;color:var(--navy);font-weight:bold;margin-bottom:3px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:640px){.two,.three{grid-template-columns:1fr}}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#fff}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:#eef0f7;color:var(--navy);font-weight:600}
.gest{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;color:#fff;font-weight:600}
.sec{font-weight:bold;color:var(--navy);margin:16px 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.03em}
.ov{position:fixed;inset:0;background:rgba(20,22,40,.5);display:none;align-items:flex-start;justify-content:center;z-index:40;padding:24px 12px;overflow:auto}
.modal{background:#fff;border-radius:14px;max-width:640px;width:100%;padding:20px}
.modal h3{color:var(--navy);margin-bottom:4px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
@media(max-width:640px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px}
.kpi .l{font-size:11px;color:var(--mut)}.kpi .v{font-size:20px;font-weight:bold;color:var(--navy)}
.kpi.g{border-left:4px solid var(--green)}.kpi.m{border-left:4px solid var(--must)}.kpi.n{border-left:4px solid var(--navy)}
.etapa{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.etapa.hecho{background:#f2f8ec}.etapa.curso{background:#fffdf3}.etapa.hito{border-color:var(--green);border-width:2px}
.etaphead{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.etaphead .nm{font-weight:bold;color:var(--navy);flex:1;min-width:120px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.login{max-width:360px;margin:60px auto;padding:26px}
.login h2{color:var(--navy);margin-bottom:4px}
.adj{font-size:12px;background:#f6f7fb;border:1px solid var(--line);border-radius:6px;padding:5px 8px;margin:4px 0;display:flex;justify-content:space-between;align-items:center;gap:8px}
.pill{cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 10px;font-size:12px}
.pill.on{background:var(--navy);color:#fff;border-color:var(--navy)}
</style></head>
<body>
<div id="root"></div>

<div class="ov" id="ov"><div class="modal" id="modal"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== CONFIG ===================== */
var SUPA_URL='https://bgoetvepmyfpolowgwnr.supabase.co';
var SUPA_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnb2V0dmVwbXlmcG9sb3dnd25yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MzMxNTgsImV4cCI6MjA5ODQwOTE1OH0.9eE5iDiaMO9R3b_paSxMHnzLCrRA-ewreuFJhU-LnjU';
var OWNER_EMAIL='yaelsescovich@fourtms.com';
var sb=null, SESSION=null, IS_ADMIN=false, EJEC=[], TAB='proyectos', PROY=null;

/* plantillas de etapas por línea (hito = fin del reloj; post = post-venta, no cuenta al reloj) */
var TPL={
 T1:[{n:'Kick-off / Levantamiento de perfil',l:'4tms'},{n:'Estrategia de búsqueda + publicación',l:'4tms'},
     {n:'Status I (prospectos enviados)',l:'4tms'},{n:'Status II (mín. 3 preseleccionados)',l:'4tms'},
     {n:'Status III',l:'4tms'},{n:'Status IV',l:'4tms'},{n:'Entrevistas cliente + feedback',l:'cliente'},
     {n:'Evaluación psicológica',l:'4tms'},{n:'Referencias',l:'4tms'},
     {n:'Carta de oferta + fecha de ingreso',l:'cliente',hito:true},
     {n:'Encuesta de satisfacción',l:'4tms',post:true},{n:'Mentoring placement',l:'4tms',post:true},{n:'Follow up cliente',l:'4tms',post:true}],
 T2:[{n:'Kick-off',l:'4tms'},{n:'Definición de programa',l:'4tms'},{n:'Desarrollo de sesiones',l:'4tms'},
     {n:'Follow up',l:'4tms'},{n:'Informe final',l:'4tms',hito:true}],
 T3:[{n:'Kick-off',l:'4tms'},{n:'Diagnóstico',l:'4tms'},{n:'Diseño',l:'4tms'},{n:'Validación',l:'cliente'},
     {n:'Implementación',l:'4tms'},{n:'Informe final',l:'4tms',hito:true}],
 T4:[{n:'Kick-off',l:'4tms'},{n:'Levantamiento de cargos',l:'4tms'},{n:'Recolección de datos',l:'4tms'},
     {n:'Análisis / Benchmark',l:'4tms'},{n:'Presentación',l:'cliente'},{n:'Informe final',l:'4tms',hito:true}]
};
var LINEAS=['T1','T2','T3','T4'];
var AREAS=['Comercial','RRHH','Operaciones','KAM','Marketing','Finanzas','Tecnología','Otro'];
var NIVELES=['Analista / Asistente','Profesional / Especialista','Jefatura','Subgerencia','Gerencia','Dirección / C-level'];
var EST_CAND=[{k:'nuevo',t:'Nuevo'},{k:'revisado',t:'Revisado'},{k:'en_proceso',t:'En proceso'},{k:'descartado',t:'Descartado'}];

/* ===================== HELPERS ===================== */
function el(id){return document.getElementById(id);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fix(s){if(s==null)return '';return String(s).replace(/\s+/g,' ').trim();}
function today(){var d=new Date();return d.toISOString().slice(0,10);}
function esc2(s){return esc(fix(s));}
function fmtMoney(v,m){if(v==null||v==='')return '—';var n=Math.round(Number(v));if(m==='UF'||m==='USD')return (m==='UF'?'UF ':'US$ ')+n.toLocaleString('es-CL');return '$ '+n.toLocaleString('es-CL');}
function daysBetween(a,b){if(!a)return 0;var s=new Date(a),e=b?new Date(b):new Date();var d=Math.round((e-s)/86400000);return d<0?0:d;}
function meNombre(){if(!SESSION)return '';var e=EJEC.find(function(x){return (x.email||'').toLowerCase()===(SESSION.email||'').toLowerCase();});return e?e.nombre:(SESSION.email||'').split('@')[0];}
function ejecActivos(){return EJEC.filter(function(e){return e.activo!==false;});}
function ecolor(n){var e=EJEC.find(function(x){return x.nombre===n;});return e&&e.color?e.color:'#8a8f9c';}
function closeOv(){el('ov').style.display='none';el('modal').innerHTML='';}
function openModal(h){el('modal').innerHTML=h;el('ov').style.display='flex';}
function ejecOpts(sel){return '<option value="">— consultor —</option><option'+(sel==='4TMS'?' selected':'')+'>4TMS</option>'+ejecActivos().map(function(e){return '<option'+(e.nombre===sel?' selected':'')+'>'+esc(e.nombre)+'</option>';}).join('');}

/* ===================== AUTH ===================== */
function loginView(){
 el('root').innerHTML='<div class="card login"><h2>4TMS · Operación</h2><div class="hint" style="margin-bottom:14px">Entra con tu cuenta del equipo.</div>'
  +'<div class="fld"><label>Email</label><input id="lg_mail" type="email" autocomplete="username"></div>'
  +'<div class="fld"><label>Contraseña</label><input id="lg_pass" type="password" autocomplete="current-password" onkeydown="if(event.key===\'Enter\')doLogin()"></div>'
  +'<button class="btn" style="width:100%;margin-top:8px" onclick="doLogin()">Entrar</button>'
  +'<div class="hint" id="lg_msg" style="color:#c0392b;margin-top:8px;text-align:center"></div></div>';
}
async function doLogin(){
 var m=el('lg_msg');m.textContent='';
 var r=await sb.auth.signInWithPassword({email:(el('lg_mail').value||'').trim(),password:el('lg_pass').value||''});
 if(r.error){m.textContent='No pudimos entrar: '+r.error.message;return;}
 await boot();
}
async function logout(){await sb.auth.signOut();location.reload();}

/* ===================== BOOT ===================== */
async function loadEjec(){try{var r=await sb.from('ejecutivos').select('*').order('nombre');EJEC=r.data||[];}catch(e){EJEC=[];}}
async function boot(){
 var s=await sb.auth.getSession();SESSION=s.data.session?s.data.session.user:null;
 if(!SESSION){loginView();return;}
 await loadEjec();
 var me=EJEC.find(function(e){return (e.email||'').toLowerCase()===(SESSION.email||'').toLowerCase();});
 IS_ADMIN=(me&&me.admin===true)||(SESSION.email||'').toLowerCase()===OWNER_EMAIL;
 shell();
}
function shell(){
 el('root').innerHTML='<header><div class="logo">4T<span>MS</span></div><div style="font-size:13px;color:#c7cbe0">Operación · entrega de proyectos</div>'
  +'<div class="who"><span>'+esc(meNombre())+(IS_ADMIN?' · admin':'')+'</span><button class="btn ghost sm" onclick="logout()">Salir</button></div></header>'
  +'<div class="tabs" id="tabs"></div><div class="main" id="app"></div>';
 renderTabs();render();
}
function renderTabs(){
 var T=[['proyectos','Proyectos'],['bbdd','BBDD candidatos'],['proactivas','Proactivas'],['encuestas','Encuestas']];
 el('tabs').innerHTML=T.map(function(t){return '<button class="'+(TAB===t[0]?'on':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';}).join('');
}
function setTab(t){TAB=t;PROY=null;renderTabs();render();}
function render(){
 if(TAB==='proyectos')return PROY?renderProyectoDetalle(PROY):renderProyectos();
 if(TAB==='bbdd')return renderBBDD();
 if(TAB==='proactivas')return renderProactivas();
 if(TAB==='encuestas')return renderEncuestas();
}

/* ===================== PROYECTOS ===================== */
var PF={estado:'vigente',linea:'',cons:''};
function consBadges(asig){if(!asig||!asig.length)return '<span class="muted">—</span>';return asig.map(function(a){var t=a.pct_ejecucion||0,c=a.pct_comercial||0;return '<span class="gest" style="background:'+ecolor(a.ejecutivo)+'" title="Ejec '+t+'% · Com '+c+'%">'+esc(a.ejecutivo)+' '+(t+c)+'%</span>';}).join(' ');}
function esVigente(p){return (p.estado||'activo')!=='cerrado';}

async function renderProyectos(){
 el('app').innerHTML='<div class="empty">Cargando proyectos…</div>';
 try{
  var r=await sb.from('proyectos').select('*').order('created_at',{ascending:false});var all=r.data||[];
  var cons=[]; all.forEach(function(p){(p.asignaciones||[]).forEach(function(a){if(a.ejecutivo&&cons.indexOf(a.ejecutivo)<0)cons.push(a.ejecutivo);});});
  var rows=all.filter(function(p){
   if(PF.estado==='vigente'&&!esVigente(p))return false;
   if(PF.estado==='cerrado'&&esVigente(p))return false;
   if(PF.linea&&p.linea!==PF.linea)return false;
   if(PF.cons&&!((p.asignaciones||[]).some(function(a){return a.ejecutivo===PF.cons;})))return false;
   return true;
  });
  var vig=all.filter(esVigente).length;
  var h='<div class="kpis"><div class="kpi n"><div class="l">Proyectos vigentes</div><div class="v">'+vig+'</div></div>'
   +'<div class="kpi"><div class="l">Cerrados</div><div class="v">'+(all.length-vig)+'</div></div>'
   +'<div class="kpi g"><div class="l">Total proyectos</div><div class="v">'+all.length+'</div></div>'
   +'<div class="kpi m"><div class="l">Líneas activas</div><div class="v">'+(new Set(all.filter(esVigente).map(function(p){return p.linea;}))).size+'</div></div></div>';
  h+='<div class="bar">'
   +'<select onchange="PF.estado=this.value;renderProyectos()"><option value="vigente"'+(PF.estado==='vigente'?' selected':'')+'>Vigentes</option><option value="cerrado"'+(PF.estado==='cerrado'?' selected':'')+'>Cerrados</option><option value="todos"'+(PF.estado==='todos'?' selected':'')+'>Todos</option></select>'
   +'<select onchange="PF.linea=this.value;renderProyectos()"><option value="">Toda línea</option>'+LINEAS.map(function(l){return '<option'+(PF.linea===l?' selected':'')+'>'+l+'</option>';}).join('')+'</select>'
   +'<select onchange="PF.cons=this.value;renderProyectos()"><option value="">Todo consultor</option>'+cons.map(function(c){return '<option'+(PF.cons===c?' selected':'')+'>'+esc(c)+'</option>';}).join('')+'</select>'
   +'</div>';
  h+='<div class="card"><table><thead><tr><th>Cliente</th><th>Cargo / proyecto</th><th>Línea</th><th>Valor</th><th>Consultores</th><th>Estado</th><th></th></tr></thead><tbody>';
  if(!rows.length)h+='<tr><td colspan=7 class="empty">Sin proyectos. Los proyectos entran desde Prospección con “Entró → Proyecto”.</td></tr>';
  rows.forEach(function(p){
   h+='<tr><td><b>'+esc2(p.cliente)+'</b></td><td>'+esc2(p.cargo)+'</td><td><span class="badge">'+esc(p.linea||'—')+'</span></td>'
    +'<td>'+fmtMoney(p.valor_cierre,p.moneda)+'</td><td>'+consBadges(p.asignaciones)+'</td>'
    +'<td>'+(esVigente(p)?'<span class="tag" style="background:var(--green)">Vigente</span>':'<span class="tag" style="background:#9aa0a6">Cerrado</span>')+'</td>'
    +'<td><button class="btn ghost sm" onclick="openProyecto('+p.id+')">Abrir</button></td></tr>';
  });
  h+='</tbody></table></div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty" style="color:#c0392b">Error: '+esc(e.message||e)+'</div></div>';}
}
function openProyecto(id){PROY=id;renderProyectoDetalle(id);}

async function renderProyectoDetalle(id){
 el('app').innerHTML='<div class="empty">Cargando…</div>';
 try{
  var p=(await sb.from('proyectos').select('*').eq('id',id).single()).data;
  var etp=(await sb.from('proyecto_etapas').select('*').eq('proyecto_id',id).order('orden')).data||[];
  var adj=(await sb.from('adjuntos').select('*').eq('proyecto_id',id).order('created_at',{ascending:false})).data||[];
  var refs=(await sb.from('referencias').select('*').eq('proyecto_id',id).order('created_at',{ascending:false})).data||[];
  var enc=(await sb.from('encuestas').select('*').eq('proyecto_id',id).order('created_at',{ascending:false})).data||[];

  // relojes: sumar días por lado hasta el hito (post-venta no cuenta)
  var hitoOrden=null;etp.forEach(function(e){if(e.hito&&hitoOrden===null)hitoOrden=e.orden;});
  var r4=0,rc=0;etp.forEach(function(e){if(hitoOrden!==null&&e.orden>hitoOrden)return;var d=daysBetween(e.inicio_at,e.fin_at);if(e.lado==='cliente')rc+=d;else r4+=d;});

  var h='<div class="bar"><button class="btn ghost sm" onclick="setTab(\'proyectos\')">← Proyectos</button>'
   +(IS_ADMIN?'<button class="btn ghost sm" style="margin-left:auto" onclick="'+(esVigente(p)?'cerrarProyecto('+id+')':'reabrirProyecto('+id+')')+'">'+(esVigente(p)?'Cerrar proyecto':'Reabrir')+'</button>':'')+'</div>';
  h+='<div class="card"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">'
   +'<div><div style="font-size:18px;font-weight:bold;color:var(--navy)">'+esc2(p.cliente)+'</div><div class="muted">'+esc2(p.cargo)+' · <span class="badge">'+esc(p.linea)+'</span> · '+fmtMoney(p.valor_cierre,p.moneda)+'</div><div style="margin-top:6px">'+consBadges(p.asignaciones)+'</div></div>'
   +'<div>'+(esVigente(p)?'<span class="tag" style="background:var(--green)">Vigente</span>':'<span class="tag" style="background:#9aa0a6">Cerrado</span>')+(p.exito_at?'<div class="hint">Hito: '+esc(p.exito_at)+'</div>':'')+'</div></div></div>';

  // relojes
  h+='<div class="kpis"><div class="kpi g"><div class="l">Reloj 4TMS (días)</div><div class="v">'+r4+'</div></div>'
   +'<div class="kpi m"><div class="l">Reloj Cliente (días)</div><div class="v">'+rc+'</div></div>'
   +'<div class="kpi n"><div class="l">Total al hito</div><div class="v">'+(r4+rc)+'</div></div>'
   +'<div class="kpi"><div class="l">Dónde está la pelota</div><div class="v" style="font-size:15px">'+(etp.length?ladoActual(etp):'—')+'</div></div></div>';

  // etapas
  h+='<div class="sec">Etapas del proceso</div>';
  if(!etp.length){
   h+='<div class="card"><div class="empty">Sin etapas. Puedes sembrar la plantilla de '+esc(p.linea)+' o crear las tuyas.</div>'
    +'<div style="text-align:center"><button class="btn g sm" onclick="sembrarEtapas('+id+',\''+p.linea+'\')">Sembrar etapas de '+esc(p.linea)+'</button> <button class="btn ghost sm" onclick="nuevaEtapa('+id+','+etp.length+')">+ Etapa vacía</button></div></div>';
  }else{
   h+='<div class="card">';
   etp.forEach(function(e){
    var cls='etapa'+(e.estado==='hecho'?' hecho':e.estado==='en_curso'?' curso':'')+(e.hito?' hito':'');
    var ladoTag=e.lado==='cliente'?'<span class="tag" style="background:var(--must);color:#20232e">Cliente</span>':'<span class="tag" style="background:var(--navy)">4TMS</span>';
    var estTag=e.estado==='hecho'?'<span class="badge" style="background:#e9f3dc;color:#3b6d11">Hecho</span>':e.estado==='en_curso'?'<span class="badge" style="background:#fbf1d8;color:#8a5b08">En curso</span>':'<span class="badge">Pendiente</span>';
    var eadj=adj.filter(function(a){return a.etapa_id===e.id;});
    h+='<div class="'+cls+'"><div class="etaphead"><span class="nm">'+(e.hito?'★ ':'')+esc(e.etapa_nombre)+'</span>'+estTag+' '+ladoTag
      +(e.responsable?' <span class="gest" style="background:'+ecolor(e.responsable)+'">'+esc(e.responsable)+'</span>':'')+'</div>';
    var fechas=[];if(e.inicio_at)fechas.push('Inicio '+String(e.inicio_at).slice(0,10));if(e.fin_at)fechas.push('Fin '+String(e.fin_at).slice(0,10));
    if(fechas.length)h+='<div class="hint" style="margin:4px 0">'+fechas.join(' · ')+(e.inicio_at?' · '+daysBetween(e.inicio_at,e.fin_at)+' días':'')+'</div>';
    if(e.nota)h+='<div style="margin:4px 0">'+esc(e.nota)+'</div>';
    eadj.forEach(function(a){h+='<div class="adj"><span>'+(a.tipo==='cv'?'📄 ':'📎 ')+esc(a.nombre)+'</span><span><button class="btn ghost sm" onclick="verAdj(\''+esc(a.path)+'\')">Ver</button>'+(IS_ADMIN?' <button class="btn ghost sm" onclick="borrarAdj('+a.id+','+id+')">✕</button>':'')+'</span></div>';});
    h+='<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">'
      +(e.estado!=='en_curso'&&e.estado!=='hecho'?'<button class="btn ghost sm" onclick="etpEstado('+e.id+',\'en_curso\','+id+')">Iniciar</button>':'')

/* pauta proactiva */
var PAUTA=[['fortalezas','Fortalezas'],['desarrollo','Áreas de desarrollo'],['motivacion','Motivación / búsqueda'],['movilidad','Movilidad / disponibilidad'],['resumen','Resumen / informe']];
async function entrevistaProactiva(id){
 var c=(await sb.from('candidatos').select('*').eq('id',id).single()).data;var pa=c.pauta||{};
 var h='<h3>Entrevista proactiva · '+esc2(c.nombre)+'</h3>';
 PAUTA.forEach(function(q){h+='<div class="fld"><label>'+q[1]+'</label><textarea id="pt_'+q[0]+'">'+esc(pa[q[0]]||'')+'</textarea></div>';});
 h+='<div class="fld"><label>Evaluación general</label><select id="pt_eval"><option value="">—</option>'+['Muy buena','Buena','Regular','No avanza'].map(function(x){return '<option'+(pa.eval===x?' selected':'')+'>'+x+'</option>';}).join('')+'</select></div>';
 h+='<div style="text-align:right"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" onclick="savePauta('+id+')">Guardar pauta</button></div>';
 openModal(h);
}
async function savePauta(id){
 var pa={};PAUTA.forEach(function(q){pa[q[0]]=fix(el('pt_'+q[0]).value);});pa.eval=el('pt_eval').value;
 try{await sb.from('candidatos').update({pauta:pa,entrevistada_at:today(),estado:'revisado',updated_at:new Date().toISOString()}).eq('id',id);closeOv();TAB==='proactivas'?renderProactivas():renderBBDD();}catch(e){alert(e.message||e);}
}

/* ===================== PROACTIVAS ===================== */
async function renderProactivas(){
 el('app').innerHTML='<div class="empty">Cargando…</div>';
 try{
  var r=await sb.from('candidatos').select('*').not('entrevistada_at','is',null).order('entrevistada_at',{ascending:false});var all=r.data||[];
  var vig=(await sb.from('proyectos').select('id,cliente,cargo,linea,estado')).data||[];vig=vig.filter(esVigente);
  var h='<div class="hint" style="margin-bottom:8px">Candidatos ya entrevistados de forma proactiva. Al final, se asignan a un proyecto vigente.</div>';
  h+='<div class="card"><table><thead><tr><th>Candidato</th><th>Área / cargo</th><th>Nivel</th><th>Entrevista</th><th>Eval</th><th></th></tr></thead><tbody>';
  if(!all.length)h+='<tr><td colspan=6 class="empty">Aún no hay entrevistas proactivas. Se generan desde la ficha de un candidato en BBDD.</td></tr>';
  all.forEach(function(c){var pa=c.pauta||{};
   h+='<tr><td><b>'+esc2(c.nombre)+'</b></td><td class="muted">'+esc(c.area||'')+(c.cargo_interes?' · '+esc2(c.cargo_interes):'')+'</td><td class="muted">'+esc(c.nivel||'')+'</td>'
    +'<td class="muted">'+esc(c.entrevistada_at||'')+'</td><td>'+esc(pa.eval||'—')+'</td>'
    +'<td><button class="btn ghost sm" onclick="fichaCand('+c.id+')">Ver</button> <button class="btn g sm" onclick="asignarProy('+c.id+')"'+(vig.length?'':' disabled')+'>Asignar a proyecto</button></td></tr>';
  });
  h+='</tbody></table>'+(vig.length?'':'<div class="hint" style="margin-top:8px">No hay proyectos vigentes para asignar.</div>')+'</div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty" style="color:#c0392b">Error: '+esc(e.message||e)+'</div></div>';}
}
async function asignarProy(cid){
 var c=(await sb.from('candidatos').select('*').eq('id',cid).single()).data;
 var vig=(await sb.from('proyectos').select('id,cliente,cargo,linea,estado')).data||[];vig=vig.filter(esVigente);
 var h='<h3>Asignar a proyecto vigente</h3><div class="muted" style="margin-bottom:8px">'+esc2(c.nombre)+'</div>'
  +'<div class="fld"><label>Proyecto</label><select id="ap_proy"><option value="">— elige —</option>'+vig.map(function(p){return '<option value="'+p.id+'">'+esc2(p.cliente)+' · '+esc2(p.cargo)+' ('+esc(p.linea)+')</option>';}).join('')+'</select></div>'
  +'<div style="text-align:right"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" onclick="doAsignar('+cid+')">Asignar</button></div>';
 openModal(h);
}
async function doAsignar(cid){
 var pid=el('ap_proy').value;if(!pid){alert('Elige un proyecto.');return;}
 var c=(await sb.from('candidatos').select('nombre').eq('id',cid).single()).data;
 try{
  await sb.from('entrevistas').insert({proyecto_id:parseInt(pid),candidato:c.nombre,tipo:'4tms',fecha:today(),resultado:'Desde proactivas'});
  await sb.from('candidatos').update({estado:'en_proceso',updated_at:new Date().toISOString()}).eq('id',cid);
  closeOv();alert('Asignado. El candidato quedó ligado al proyecto.');renderProactivas();
 }catch(e){alert(e.message||e);}
}

/* ===================== ENCUESTAS ===================== */
async function renderEncuestas(){
 el('app').innerHTML='<div class="empty">Cargando encuestas…</div>';
 try{
  var enc=(await sb.from('encuestas').select('*').order('fecha',{ascending:false})).data||[];
  var proy=(await sb.from('proyectos').select('id,cliente,cargo')).data||[];
  var pm={};proy.forEach(function(p){pm[p.id]=p;});
  var cli=enc.filter(function(e){return e.tipo==='cliente'&&e.puntaje!=null});var cand=enc.filter(function(e){return e.tipo==='candidato'&&e.puntaje!=null});
  var prom=function(a){if(!a.length)return '—';return (a.reduce(function(s,x){return s+x.puntaje;},0)/a.length).toFixed(1)+'/10';};
  var h='<div class="kpis"><div class="kpi g"><div class="l">Prom. cliente</div><div class="v">'+prom(cli)+'</div></div>'
   +'<div class="kpi m"><div class="l">Prom. candidato</div><div class="v">'+prom(cand)+'</div></div>'
   +'<div class="kpi n"><div class="l">Encuestas cliente</div><div class="v">'+cli.length+'</div></div>'
   +'<div class="kpi"><div class="l">Encuestas candidato</div><div class="v">'+cand.length+'</div></div></div>';
  h+='<div class="card"><table><thead><tr><th>Proyecto</th><th>Tipo</th><th>Puntaje</th><th>Comentario</th><th>Fecha</th></tr></thead><tbody>';
  if(!enc.length)h+='<tr><td colspan=5 class="empty">Sin encuestas. Se registran dentro de cada proyecto.</td></tr>';
  enc.forEach(function(e){var p=pm[e.proyecto_id];h+='<tr><td><b>'+(p?esc2(p.cliente):'—')+'</b><div class="hint">'+(p?esc2(p.cargo):'')+'</div></td><td>'+esc(e.tipo)+'</td><td><b>'+(e.puntaje!=null?e.puntaje+'/10':'—')+'</b></td><td>'+esc2(e.comentario)+'</td><td class="muted">'+esc(String(e.fecha||'').slice(0,10))+'</td></tr>';});
  h+='</tbody></table></div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty" style="color:#c0392b">Error: '+esc(e.message||e)+'</div></div>';}
}

function waitSDK(ms){return new Promise(function(r){var t=Date.now();(function c(){if(window.supabase&&window.supabase.createClient)return r(true);if(Date.now()-t>ms)return r(false);setTimeout(c,80);})();});}
(async function(){
 var ok=await waitSDK(8000);
 if(!ok){el('root').innerHTML='<div class="card login"><div class="empty" style="color:#c0392b">No cargó la librería. Revisa tu conexión y recarga.</div></div>';return;}
 sb=window.supabase.createClient(SUPA_URL,SUPA_ANON);
 await boot();
})();
</script>
