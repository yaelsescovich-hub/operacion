<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>4TMS · Operación</title>
<style>
:root{--navy:#22255A;--must:#D8A828;--green:#6FA52C;--red:#c0392b;--ink:#20232e;--mut:#6b7280;--line:#e3e6ef;--bg:#f4f5f9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
header{background:var(--navy);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
header .logo{font-weight:bold;font-size:18px}header .logo span{color:var(--must)}
header .who{margin-left:auto;font-size:12px;color:#c7cbe0;display:flex;align-items:center;gap:10px}
.tabs{background:#fff;border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 12px;position:sticky;top:48px;z-index:19;overflow-x:auto}
.tabs button{border:none;background:none;padding:12px 14px;font-size:14px;color:var(--mut);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tabs button.on{color:var(--navy);font-weight:bold;border-bottom-color:var(--must)}
.main{max-width:1140px;margin:0 auto;padding:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:0 4px 14px rgba(20,22,40,.04);margin-bottom:14px}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.search{flex:1;min-width:170px;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:14px}
select,input,textarea{border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:14px;font-family:inherit;background:#fff}
textarea{width:100%;min-height:56px;resize:vertical}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
th{color:var(--mut);font-weight:bold;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
td.r,th.r{text-align:right}
.btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:bold;cursor:pointer;text-decoration:none;display:inline-block}
.btn.g{background:var(--green)}.btn.m{background:var(--must);color:#20232e}.btn.ghost{background:#eef0f7;color:var(--navy)}.btn.sm{padding:6px 9px;font-size:12px}
.btn:disabled{opacity:.55;cursor:default}
.empty{color:var(--mut);text-align:center;padding:22px}
.muted{color:var(--mut)}.hint{font-size:12px;color:var(--mut)}
.fld{margin:8px 0}.fld label{display:block;font-size:12px;color:var(--navy);font-weight:bold;margin-bottom:3px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:640px){.two,.three{grid-template-columns:1fr}}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#fff}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:#eef0f7;color:var(--navy);font-weight:600}
.gest{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;color:#fff;font-weight:600}
.sec{font-weight:bold;color:var(--navy);margin:16px 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.03em}
.ov{position:fixed;inset:0;background:rgba(20,22,40,.5);display:none;align-items:flex-start;justify-content:center;z-index:40;padding:24px 12px;overflow:auto}
.modal{background:#fff;border-radius:14px;max-width:660px;width:100%;padding:20px}
.modal h3{color:var(--navy);margin-bottom:4px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
@media(max-width:640px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px}
.kpi .l{font-size:11px;color:var(--mut)}.kpi .v{font-size:20px;font-weight:bold;color:var(--navy)}
.kpi.g{border-left:4px solid var(--green)}.kpi.m{border-left:4px solid var(--must)}.kpi.n{border-left:4px solid var(--navy)}.kpi.r{border-left:4px solid var(--red)}
.pbar{height:8px;background:#eef0f7;border-radius:6px;overflow:hidden}.pbar>span{display:block;height:100%;background:var(--green)}
.pbarmini{height:6px;background:#eef0f7;border-radius:4px;overflow:hidden;min-width:70px}.pbarmini>span{display:block;height:100%;background:var(--green)}
/* etapas estilo checklist con fecha */
.etaprow{display:flex;align-items:center;gap:10px;padding:9px 6px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.etaprow.hecho{background:#f5faef}
.sw{position:relative;width:38px;height:22px;flex:0 0 auto;cursor:pointer}
.sw input{opacity:0;width:0;height:0}
.sw span{position:absolute;inset:0;background:#cfd3de;border-radius:22px;transition:.15s}
.sw span:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
.sw input:checked+span{background:var(--green)}.sw input:checked+span:before{transform:translateX(16px)}
.etnm{flex:1;min-width:140px;font-weight:bold;color:var(--navy)}
.etmeta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.divpost{border-top:1px dashed var(--line);margin:6px 0;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding-top:8px}
.adj{font-size:12px;background:#f6f7fb;border:1px solid var(--line);border-radius:6px;padding:5px 8px;margin:4px 0 4px 48px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.hito{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px}
.hito.pagado{background:#f5faef}.hito.anulado{opacity:.6}
.tgl{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mut)}
.login{max-width:360px;margin:60px auto;padding:26px}.login h2{color:var(--navy);margin-bottom:4px}
.genrow{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
</style></head>

var CALCE=['Alta','Media','Baja'];
var SURVEYS={cliente:'https://docs.google.com/forms/d/1RLE00r_PxnXENK20jlfv5JS6MW3gq3LR9GFHqJ46RD0/viewform',candidato:'https://docs.google.com/forms/d/19an-bAcWivBv7ZZwojeHyD0VDjBuoy4FjMn5kTo3Aco/viewform'};

/* ===================== HELPERS ===================== */
function el(id){return document.getElementById(id);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fix(s){if(s==null)return '';return String(s).replace(/\s+/g,' ').trim();}
function esc2(s){return esc(fix(s));}
function today(){return new Date().toISOString().slice(0,10);}
function fmtMoney(v,m){if(v==null||v==='')return '—';var n=Math.round(Number(v));if(m==='UF')return 'UF '+n.toLocaleString('es-CL');if(m==='USD')return 'US$ '+n.toLocaleString('es-CL');return '$'+n.toLocaleString('es-CL');}
function daysBetween(a,b){if(!a)return 0;var s=new Date(a),e=b?new Date(b):new Date();var d=Math.round((e-s)/86400000);return d<0?0:d;}
function meNombre(){if(!SESSION)return '';var e=EJEC.find(function(x){return (x.email||'').toLowerCase()===(SESSION.email||'').toLowerCase();});return e?e.nombre:(SESSION.email||'').split('@')[0];}
function ejecActivos(){return EJEC.filter(function(e){return e.activo!==false;});}
function ecolor(n){var e=EJEC.find(function(x){return x.nombre===n;});return e&&e.color?e.color:'#8a8f9c';}
function closeOv(){el('ov').style.display='none';el('modal').innerHTML='';}
function openModal(h){el('modal').innerHTML=h;el('ov').style.display='flex';}
function ejecOpts(sel){return '<option value="">— consultor —</option><option'+(sel==='4TMS'?' selected':'')+'>4TMS</option>'+ejecActivos().map(function(e){return '<option'+(e.nombre===sel?' selected':'')+'>'+esc(e.nombre)+'</option>';}).join('');}
function stars(n){n=parseInt(n)||0;var s='';for(var i=1;i<=5;i++){s+='<span style="color:'+(i<=n?'#D8A828':'#d5d8e0')+';font-size:14px">\u2605</span>';}return s;}
function estCPLabel(k){var e=EST_CP.find(function(x){return x.k===(k||'postulante');});return e?e.t:k;}
function cpColor(k){return {colocado:'var(--green)',oferta:'#3b6d11',descartado:'#9aa0a6',presentado:'var(--navy)'}[k]||'var(--must)';}
function calceColor(c){return c==='Alta'?'#6FA52C':c==='Media'?'#D8A828':c==='Baja'?'#9aa0a6':'#c9ccd6';}
function downloadCsv(name,rows){var csv=rows.map(function(r){return r.map(function(c){var s=(c==null?'':String(c)).replace(/"/g,'""');return '"'+s+'"';}).join(',');}).join('\n');var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();}

/* ===================== AUTH ===================== */
function loginView(){el('root').innerHTML='<div class="card login"><h2>4TMS · Operación</h2><div class="hint" style="margin-bottom:14px">Entra con tu cuenta del equipo.</div><div class="fld"><label>Email</label><input id="lg_mail" type="email" style="width:100%"></div><div class="fld"><label>Contraseña</label><input id="lg_pass" type="password" style="width:100%" onkeydown="if(event.key===\'Enter\')doLogin()"></div><button class="btn" style="width:100%;margin-top:8px" onclick="doLogin()">Entrar</button><div class="hint" id="lg_msg" style="color:var(--red);margin-top:8px;text-align:center"></div></div>';}
async function doLogin(){var m=el('lg_msg');m.textContent='';var r=await sb.auth.signInWithPassword({email:(el('lg_mail').value||'').trim(),password:el('lg_pass').value||''});if(r.error){m.textContent='No pudimos entrar: '+r.error.message;return;}await boot();}
async function logout(){await sb.auth.signOut();location.reload();}
async function loadEjec(){try{var r=await sb.from('ejecutivos').select('*').order('nombre');EJEC=r.data||[];}catch(e){EJEC=[];}}
async function boot(){var s=await sb.auth.getSession();SESSION=s.data.session?s.data.session.user:null;if(!SESSION){loginView();return;}await loadEjec();var me=EJEC.find(function(e){return (e.email||'').toLowerCase()===(SESSION.email||'').toLowerCase();});IS_ADMIN=(me&&me.admin===true)||(SESSION.email||'').toLowerCase()===OWNER_EMAIL;shell();}
function shell(){el('root').innerHTML='<header><div class="logo">4T<span>MS</span></div><div style="font-size:13px;color:#c7cbe0">Operación · headhunting</div><div class="who"><span>'+esc(meNombre())+(IS_ADMIN?' · admin':'')+'</span><button class="btn ghost sm" onclick="logout()">Salir</button></div></header><div class="tabs" id="tabs"></div><div class="main" id="app"></div>';renderTabs();render();}
function renderTabs(){var T=[['dashboard','Dashboard'],['proyectos','Proyectos'],['bbdd','BBDD candidatos'],['proactivas','Proactivas'],['generadores','Generadores']];el('tabs').innerHTML=T.map(function(t){return '<button class="'+(TAB===t[0]?'on':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';}).join('');}
function setTab(t){TAB=t;PROY=null;renderTabs();render();}
function render(){if(TAB==='dashboard')return renderDashboard();if(TAB==='proyectos')return PROY?renderProyectoDetalle(PROY):renderProyectos();if(TAB==='bbdd')return renderBBDD();if(TAB==='proactivas')return renderProactivas();if(TAB==='generadores')return renderGeneradores();}
function esVigente(p){return (p.estado||'activo')!=='cerrado';}
function consBadges(asig){if(!asig||!asig.length)return '<span class="muted">—</span>';return asig.map(function(a){var t=(a.pct_ejecucion||0),c=(a.pct_comercial||0);return '<span class="gest" style="background:'+ecolor(a.ejecutivo)+'" title="Ejec '+t+'% · Com '+c+'%">'+esc(a.ejecutivo)+' '+(t+c)+'%</span>';}).join(' ');}

/* ciclo: avance + reloj a partir de las FECHAS de hito cumplido */
function computeCiclo(etp,p){
 var total=etp.length,hitoOrden=null;etp.forEach(function(e){if(e.hito&&hitoOrden===null)hitoOrden=e.orden;});
 var core=etp.filter(function(e){return hitoOrden===null||e.orden<=hitoOrden;});
 var hechas=core.filter(function(e){return e.estado==='hecho';}).length;
 var pct=core.length?Math.round(hechas/core.length*100):0;
 var actual=etp.find(function(e){return e.estado!=='hecho';})||null;
 var prox=null;if(actual){var i=etp.indexOf(actual);prox=etp.slice(i+1).find(function(e){return e.estado!=='hecho';})||null;}
 var r4=0,rc=0;var prev=(p&&p.kickoff_at)?String(p.kickoff_at).slice(0,10):null;
 core.slice().sort(function(a,b){return (a.orden||0)-(b.orden||0);}).forEach(function(e){var f=e.fin_at?String(e.fin_at).slice(0,10):null;if(e.estado==='hecho'&&f){if(prev){var d=daysBetween(prev,f);if(e.lado==='cliente')rc+=d;else r4+=d;}prev=f;}});
 if(actual&&prev){var d=daysBetween(prev,today());if(actual.lado==='cliente')rc+=d;else r4+=d;}
 var pelota=actual?(actual.lado==='cliente'?'Cliente':'4TMS'):(total&&hechas>=core.length?'Cerrado':'—');
 return {total:total,coreLen:core.length,hechas:hechas,pct:pct,actual:actual,prox:prox,r4:r4,rc:rc,pelota:pelota,hitoOrden:hitoOrden};
}
function pelotaTag(p){if(p==='Cliente')return '<span class="tag" style="background:var(--must);color:#20232e">Cliente</span>';if(p==='4TMS')return '<span class="tag" style="background:var(--navy)">4TMS</span>';return '<span class="muted">'+esc(p)+'</span>';}

/* ===================== DASHBOARD ===================== */
async function renderDashboard(){
 el('app').innerHTML='<div class="empty">Cargando cartera…</div>';
 try{
  var proy=(await sb.from('proyectos').select('*').order('created_at',{ascending:false})).data||[];
  var vig=proy.filter(esVigente);
  var etapas=(await sb.from('proyecto_etapas').select('*')).data||[];
  var cp=(await sb.from('candidatos_proyecto').select('proyecto_id,estado')).data||[];
  var byE={};etapas.forEach(function(e){(byE[e.proyecto_id]=byE[e.proyecto_id]||[]).push(e);});
  Object.keys(byE).forEach(function(k){byE[k].sort(function(a,b){return (a.orden||0)-(b.orden||0);});});
  var enProceso=cp.filter(function(x){return x.estado!=='colocado'&&x.estado!=='descartado';}).length;
  var sumaR4=0;var rows=vig.map(function(p){var c=computeCiclo(byE[p.id]||[],p);sumaR4+=c.r4;return {p:p,c:c};});
  var pelota4=rows.filter(function(x){return x.c.pelota==='4TMS';}).length;
  var h='<div class="kpis"><div class="kpi n"><div class="l">Proyectos vigentes</div><div class="v">'+vig.length+'</div></div><div class="kpi m"><div class="l">La pelota en 4TMS</div><div class="v">'+pelota4+'</div></div><div class="kpi g"><div class="l">Candidatos en proceso</div><div class="v">'+enProceso+'</div></div><div class="kpi"><div class="l">Reloj 4TMS prom. (días)</div><div class="v">'+(vig.length?Math.round(sumaR4/vig.length):0)+'</div></div></div>';
  h+='<div class="sec">Cartera vigente · dónde está cada proyecto</div><div class="card"><table><thead><tr><th>Cliente / cargo</th><th>Línea</th><th>Etapa actual</th><th>Avance</th><th>Responsable</th><th>Reloj (4T/Cli)</th><th>Pelota</th></tr></thead><tbody>';
  if(!rows.length)h+='<tr><td colspan=7 class="empty">Sin proyectos vigentes. Crea uno en Proyectos o conviértelo desde Prospección.</td></tr>';
  rows.sort(function(a,b){var o={'4TMS':0,'Cliente':1};return (o[a.c.pelota]==null?2:o[a.c.pelota])-(o[b.c.pelota]==null?2:o[b.c.pelota]);}).forEach(function(x){var p=x.p,c=x.c;var resp=c.actual&&c.actual.responsable?c.actual.responsable:'';h+='<tr onclick="openProyecto('+p.id+')" style="cursor:pointer"><td><b>'+esc2(p.cliente)+'</b><div class="hint">'+esc2(p.cargo)+'</div></td><td><span class="badge">'+esc(p.linea||'—')+'</span></td><td>'+(c.actual?esc(c.actual.etapa_nombre):'<span class="muted">sin etapas</span>')+'</td><td><div class="pbarmini"><span style="width:'+c.pct+'%"></span></div><div class="hint">'+c.hechas+'/'+c.coreLen+' · '+c.pct+'%</div></td><td>'+(resp?'<span class="gest" style="background:'+ecolor(resp)+'">'+esc(resp)+'</span>':'<span class="muted">—</span>')+'</td><td class="muted">'+c.r4+' / '+c.rc+'</td><td>'+pelotaTag(c.pelota)+'</td></tr>';});
  h+='</tbody></table></div><div class="hint">Ordenado por dónde está la pelota: primero lo que depende de 4TMS. Toca una fila para abrir.</div>';
  el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty" style="color:var(--red)">Error: '+esc(e.message||e)+'</div></div>';}
}

/* ===================== PROYECTOS (lista + crear) ===================== */
var PF={estado:'vigente',linea:'',cons:''};
async function renderProyectos(){
 el('app').innerHTML='<div class="empty">Cargando proyectos…</div>';
 try{
  var all=(await sb.from('proyectos').select('*').order('created_at',{ascending:false})).data||[];

function openProyecto(id){PROY=id;TAB='proyectos';renderTabs();renderProyectoDetalle(id);}
var NASIG=[];
function nuevoProyecto(){
 NASIG=[{ejecutivo:meNombre(),pe:0,pc:0},{ejecutivo:'',pe:0,pc:0},{ejecutivo:'',pe:0,pc:0},{ejecutivo:'',pe:0,pc:0}];
 openModal('<h3>Nuevo proyecto</h3><div class="two"><div class="fld"><label>Cliente</label><input id="np_cli"></div><div class="fld"><label>Cargo / proyecto</label><input id="np_cargo"></div></div><div class="three"><div class="fld"><label>Línea</label><select id="np_linea">'+LINEAS.map(function(l){return '<option value="'+l+'">'+l+' · '+TDESC[l]+'</option>';}).join('')+'</select></div><div class="fld"><label>Valor de cierre (neto)</label><input id="np_valor" type="number"></div><div class="fld"><label>Moneda</label><select id="np_mon">'+MONEDAS.map(function(m){return '<option>'+m+'</option>';}).join('')+'</select></div></div><div class="sec" style="margin-top:10px">Reparto de consultores</div><div class="hint" style="margin-bottom:6px">Ejecución + comercial, entre todos, suma 100%. Puedes asignar a 4TMS.</div><div id="np_asig"></div><div id="np_tot" class="hint" style="margin-top:4px"></div><div style="text-align:right;margin-top:12px"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" onclick="saveNuevoProyecto()">Crear proyecto</button></div>');
 renderNAsig();
}
function renderNAsig(){var h='';NASIG.forEach(function(a,i){h+='<div style="display:grid;grid-template-columns:1fr 90px 90px;gap:6px;margin-bottom:6px"><select onchange="nasigSet('+i+',\'ejecutivo\',this.value)">'+ejecOpts(a.ejecutivo)+'</select><input type="number" placeholder="% ejec" value="'+(a.pe||'')+'" onchange="nasigSet('+i+',\'pe\',this.value)"><input type="number" placeholder="% com" value="'+(a.pc||'')+'" onchange="nasigSet('+i+',\'pc\',this.value)"></div>';});el('np_asig').innerHTML=h;nasigTot();}
function nasigSet(i,k,v){NASIG[i][k]=(k==='ejecutivo')?v:(parseInt(v)||0);nasigTot();}
function nasigTot(){var pe=0,pc=0;NASIG.forEach(function(a){if(a.ejecutivo){pe+=a.pe;pc+=a.pc;}});var t=pe+pc;el('np_tot').innerHTML='Total: <b>'+t+'%</b>'+(t!==100?' <span style="color:var(--red)">(debe sumar 100%)</span>':' \u2713');}
async function saveNuevoProyecto(){var cli=fix(el('np_cli').value),cargo=fix(el('np_cargo').value);if(!cli||!cargo){alert('Cliente y cargo.');return;}var asign=NASIG.filter(function(a){return a.ejecutivo;}).map(function(a){return {ejecutivo:a.ejecutivo,pct_ejecucion:a.pe,pct_comercial:a.pc};});var tot=0;asign.forEach(function(a){tot+=a.pct_ejecucion+a.pct_comercial;});if(asign.length&&tot!==100){alert('El reparto debe sumar 100%. Hoy: '+tot+'%.');return;}var row={cliente:cli,cargo:cargo,linea:el('np_linea').value,valor_cierre:parseInt(el('np_valor').value)||null,moneda:el('np_mon').value,asignaciones:asign,estado:'activo',kickoff_at:today()};try{var r=await sb.from('proyectos').insert(row).select().single();if(r.error)throw r.error;closeOv();openProyecto(r.data.id);}catch(e){alert(e.message||e);}}

function posMercado(cg){
 var a=Number(cg.renta_actual)||0;if(!a)return '<span class="muted">—</span>';
 var lo=Number(cg.renta_p25)||Number(cg.renta_min)||0;var med=Number(cg.renta_mediana)||0;var hi=Number(cg.renta_p75)||Number(cg.renta_max)||0;
 var lbl,col;
 if(lo&&a<lo){lbl='Bajo mercado';col='#c0392b';}
 else if(med&&a<med){lbl='Bajo la mediana';col='#D8A828';}
 else if(hi&&a<=hi){lbl='En rango';col='#6FA52C';}
 else if(hi&&a>hi){lbl='Sobre mercado';col='#22255A';}
 else {lbl='En rango';col='#6FA52C';}
 return '<span class="tag" style="background:'+col+'">'+lbl+'</span>';
}

 try{
  var all=(await sb.from('candidatos').select('*').order('created_at',{ascending:false}).limit(500)).data||[];
  var rows=all.filter(function(c){if(BF.area&&c.area!==BF.area)return false;if(BF.nivel&&c.nivel!==BF.nivel)return false;if(BF.estado&&(c.estado||'nuevo')!==BF.estado)return false;if(BF.q){var s=BF.q.toLowerCase();if(!((fix(c.nombre).toLowerCase().indexOf(s)>=0)||(fix(c.cargo_interes).toLowerCase().indexOf(s)>=0)||(fix(c.email).toLowerCase().indexOf(s)>=0)))return false;}return true;});

  h+='</tbody></table></div>';el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty" style="color:var(--red)">Error: '+esc(e.message||e)+'</div></div>';}
}
async function fichaCand(id){var c=(await sb.from('candidatos').select('*').eq('id',id).single()).data;var pa=c.pauta||{};var h='<h3>'+esc2(c.nombre)+'</h3><div class="muted" style="margin-bottom:8px">'+esc(c.area||'')+(c.nivel?' · '+esc(c.nivel):'')+(c.cargo_interes?' · '+esc2(c.cargo_interes):'')+'</div><div class="two"><div class="fld"><label>Email</label><div>'+esc(c.email||'—')+'</div></div><div class="fld"><label>Teléfono</label><div>'+esc(c.telefono||'—')+'</div></div></div><div class="two"><div class="fld"><label>LinkedIn</label><div>'+(c.linkedin?'<a href="'+esc(c.linkedin)+'" target="_blank">ver</a>':'—')+'</div></div><div class="fld"><label>Renta</label><div>'+esc(c.renta||'—')+'</div></div></div><div class="two"><div class="fld"><label>Estado</label><select id="fc_est">'+EST_CAND.map(function(e){return '<option value="'+e.k+'"'+((c.estado||'nuevo')===e.k?' selected':'')+'>'+e.t+'</option>';}).join('')+'</select></div><div class="fld"><label>CV</label><div>'+(c.cv_path?'<button class="btn ghost sm" onclick="verCV(\''+esc(c.cv_path)+'\')">Abrir CV</button> ':'')+'<input type="file" id="fc_cv" accept=".pdf,.doc,.docx" style="font-size:11px"></div></div></div><div class="fld"><label>Notas</label><textarea id="fc_notas">'+esc(c.notas||'')+'</textarea></div>'+(c.entrevistada_at?'<div class="sec">Pauta proactiva ('+esc(c.entrevistada_at)+')</div><div class="hint">Rating: '+stars(pa.rating)+' · Eval: <b>'+esc(pa.eval||'—')+'</b></div>'+(pa.resumen?'<div style="font-size:13px;margin-top:4px">'+esc(pa.resumen)+'</div>':''):'')+'<div class="hint" id="fc_msg"></div><div style="display:flex;gap:6px;justify-content:space-between;margin-top:12px;flex-wrap:wrap"><div>'+(c.tomado_por?'<span class="gest" style="background:'+ecolor(c.tomado_por)+'">'+esc(c.tomado_por)+'</span> <button class="btn ghost sm" onclick="liberarCand('+id+')">Liberar</button>':'<button class="btn ghost sm" onclick="tomarCand('+id+')">Tomar</button>')+'</div><div><button class="btn m sm" onclick="entrevistaProactiva('+id+')">'+(c.entrevistada_at?'Editar pauta':'Registrar entrevista')+'</button> <button class="btn ghost sm" onclick="closeOv()">Cerrar</button> <button class="btn sm" id="fc_btn" onclick="saveCand('+id+')">Guardar</button></div></div>';openModal(h);}
async function saveCand(id){el('fc_btn').disabled=true;try{var u={estado:el('fc_est').value,notas:fix(el('fc_notas').value),updated_at:new Date().toISOString()};var fi=el('fc_cv');if(fi&&fi.files[0]){var f=fi.files[0];el('fc_msg').textContent='Subiendo CV…';var safe=f.name.replace(/[^\w.\-]/g,'_');var path='bbdd/'+id+'_'+Date.now()+'_'+safe;var ru=await sb.storage.from('cvs').upload(path,f);if(ru.error)throw ru.error;u.cv_path=path;}await sb.from('candidatos').update(u).eq('id',id);closeOv();TAB==='proactivas'?renderProactivas():renderBBDD();}catch(e){if(el('fc_btn'))el('fc_btn').disabled=false;if(el('fc_msg'))el('fc_msg').textContent='Error: '+(e.message||e);}}
async function tomarCand(id){try{var r=await sb.from('candidatos').update({tomado_por:meNombre(),tomado_at:new Date().toISOString()}).eq('id',id).is('tomado_por',null);if(r.error)throw r.error;fichaCand(id);}catch(e){alert(e.message||e);}}
async function liberarCand(id){try{await sb.from('candidatos').update({tomado_por:null,tomado_at:null}).eq('id',id);fichaCand(id);}catch(e){alert(e.message||e);}}
function nuevoCand(){openModal('<h3>Nuevo candidato</h3><div class="two"><div class="fld"><label>Nombre</label><input id="nc_nom"></div><div class="fld"><label>Email</label><input id="nc_mail"></div></div><div class="two"><div class="fld"><label>Teléfono</label><input id="nc_tel"></div><div class="fld"><label>Área</label><select id="nc_area"><option value="">—</option>'+AREAS.map(function(a){return '<option>'+a+'</option>';}).join('')+'</select></div></div><div class="two"><div class="fld"><label>Cargo de interés</label><input id="nc_cargo"></div><div class="fld"><label>Nivel</label><select id="nc_niv"><option value="">—</option>'+NIVELES.map(function(n){return '<option>'+esc(n)+'</option>';}).join('')+'</select></div></div><div class="fld"><label>CV (opcional)</label><input type="file" id="nc_cv" accept=".pdf,.doc,.docx"></div><div class="hint" id="nc_msg"></div><div style="text-align:right"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" id="nc_btn" onclick="saveNuevoCand()">Guardar</button></div>');}
async function saveNuevoCand(){var nom=fix(el('nc_nom').value);if(!nom){alert('Nombre.');return;}el('nc_btn').disabled=true;try{var cv_path=null;var f=el('nc_cv').files[0];if(f){el('nc_msg').textContent='Subiendo CV…';var safe=f.name.replace(/[^\w.\-]/g,'_');cv_path='bbdd/'+Date.now()+'_'+safe;var ru=await sb.storage.from('cvs').upload(cv_path,f);if(ru.error)throw ru.error;}var row={nombre:nom,email:fix(el('nc_mail').value),telefono:fix(el('nc_tel').value),area:el('nc_area').value||null,cargo_interes:fix(el('nc_cargo').value),nivel:el('nc_niv').value||null,cv_path:cv_path,origen:'Carga manual',estado:'nuevo',responsable:meNombre()};var r=await sb.from('candidatos').insert(row);if(r.error)throw r.error;closeOv();renderBBDD();}catch(e){el('nc_btn').disabled=false;el('nc_msg').textContent='Error: '+(e.message||e);}}
var PAUTA=[['fortalezas','Fortalezas'],['desarrollo','Áreas de desarrollo'],['motivacion','Motivación / búsqueda'],['movilidad','Movilidad / disponibilidad'],['resumen','Resumen / informe']];
async function entrevistaProactiva(id){var c=(await sb.from('candidatos').select('*').eq('id',id).single()).data;var pa=c.pauta||{};var h='<h3>Entrevista proactiva · '+esc2(c.nombre)+'</h3>';PAUTA.forEach(function(q){h+='<div class="fld"><label>'+q[1]+'</label><textarea id="pt_'+q[0]+'">'+esc(pa[q[0]]||'')+'</textarea></div>';});h+='<div class="two"><div class="fld"><label>Rating (1–5)</label><select id="pt_rating"><option value="">—</option>'+[1,2,3,4,5].map(function(n){return '<option'+(String(pa.rating)===String(n)?' selected':'')+'>'+n+'</option>';}).join('')+'</select></div><div class="fld"><label>Evaluación</label><select id="pt_eval"><option value="">—</option>'+['Muy buena','Buena','Regular','No avanza'].map(function(x){return '<option'+(pa.eval===x?' selected':'')+'>'+x+'</option>';}).join('')+'</select></div></div><div style="text-align:right"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" onclick="savePauta('+id+')">Guardar pauta</button></div>';openModal(h);}
async function savePauta(id){var pa={};PAUTA.forEach(function(q){pa[q[0]]=fix(el('pt_'+q[0]).value);});pa.rating=el('pt_rating').value?parseInt(el('pt_rating').value):null;pa.eval=el('pt_eval').value;try{await sb.from('candidatos').update({pauta:pa,entrevistada_at:today(),estado:'revisado',updated_at:new Date().toISOString()}).eq('id',id);closeOv();TAB==='proactivas'?renderProactivas():renderBBDD();}catch(e){alert(e.message||e);}}

/* ===================== PROACTIVAS ===================== */
async function renderProactivas(){
 el('app').innerHTML='<div class="empty">Cargando…</div>';
 try{
  var all=(await sb.from('candidatos').select('*').not('entrevistada_at','is',null).order('entrevistada_at',{ascending:false})).data||[];
  var vig=((await sb.from('proyectos').select('id,cliente,cargo,linea,estado')).data||[]).filter(esVigente);
  var h='<div class="bar"><button class="btn g sm" onclick="nuevaProactiva()">+ Nueva entrevista proactiva</button></div><div class="hint" style="margin-bottom:8px">Candidatos ya entrevistados de forma proactiva. Al final se asignan a un proyecto vigente.</div><div class="card"><table><thead><tr><th>Candidato</th><th>Área / cargo</th><th>Rating</th><th>CV</th><th>LinkedIn</th><th>Entrevista</th><th></th></tr></thead><tbody>';
  if(!all.length)h+='<tr><td colspan=7 class="empty">Aún no hay entrevistas proactivas. Se generan desde la ficha de un candidato en BBDD.</td></tr>';
  all.forEach(function(c){var pa=c.pauta||{};h+='<tr><td><b>'+esc2(c.nombre)+'</b>'+(c.renta?'<div class="hint">Renta: '+esc(c.renta)+'</div>':'')+'</td><td class="muted">'+esc(c.area||'')+(c.cargo_interes?' · '+esc2(c.cargo_interes):'')+'</td><td>'+stars(pa.rating)+'</td><td>'+(c.cv_path?'<button class="btn ghost sm" onclick="verCV(\''+esc(c.cv_path)+'\')">CV</button>':'—')+'</td><td>'+(c.linkedin?'<a href="'+esc(c.linkedin)+'" target="_blank">in \u2197</a>':'—')+'</td><td class="muted">'+esc(c.entrevistada_at||'')+'</td><td><button class="btn ghost sm" onclick="fichaCand('+c.id+')">Ver</button> <button class="btn g sm" onclick="asignarProy('+c.id+')"'+(vig.length?'':' disabled')+'>Asignar</button></td></tr>';});
  h+='</tbody></table>'+(vig.length?'':'<div class="hint" style="margin-top:8px">No hay proyectos vigentes para asignar.</div>')+'</div>';el('app').innerHTML=h;
 }catch(e){el('app').innerHTML='<div class="card"><div class="empty" style="color:var(--red)">Error: '+esc(e.message||e)+'</div></div>';}
}
async function asignarProy(cid){var c=(await sb.from('candidatos').select('*').eq('id',cid).single()).data;var vig=((await sb.from('proyectos').select('id,cliente,cargo,linea,estado')).data||[]).filter(esVigente);var h='<h3>Asignar a proyecto vigente</h3><div class="muted" style="margin-bottom:8px">'+esc2(c.nombre)+'</div><div class="fld"><label>Proyecto</label><select id="ap_proy"><option value="">— elige —</option>'+vig.map(function(p){return '<option value="'+p.id+'">'+esc2(p.cliente)+' · '+esc2(p.cargo)+' ('+esc(p.linea)+')</option>';}).join('')+'</select></div><div style="text-align:right"><button class="btn ghost sm" onclick="closeOv()">Cancelar</button> <button class="btn sm" onclick="doAsignar('+cid+')">Asignar</button></div>';openModal(h);}
async function doAsignar(cid){var pid=el('ap_proy').value;if(!pid){alert('Elige un proyecto.');return;}var c=(await sb.from('candidatos').select('nombre,cargo_interes,linkedin,renta,cv_path,origen').eq('id',cid).single()).data;try{await sb.from('candidatos_proyecto').insert({proyecto_id:parseInt(pid),candidato_id:cid,nombre:c.nombre,cargo:c.cargo_interes,fuente:c.origen||'Proactiva',estado:'presentado',linkedin:c.linkedin,renta:c.renta,cv_path:c.cv_path,responsable:meNombre(),fecha:today()});await sb.from('candidatos').update({estado:'en_proceso',updated_at:new Date().toISOString()}).eq('id',cid);closeOv();alert('Asignado al pipeline del proyecto.');renderProactivas();}catch(e){alert(e.message||e);}}
